                            <div className="bg-green-50 p-4 rounded border-l-4 border-green-500"><h4 className="font-bold mb-4 text-green-700">付款方式與金額</h4><div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4"><label className="flex items-center space-x-2 bg-white p-3 rounded border"><input type="radio" name="payType" value="cash" checked={payType==='cash'} onChange={e=>setPayType(e.target.value)} /><span className="font-bold">現金全額</span></label><label className="flex items-center space-x-2 bg-white p-3 rounded border"><input type="radio" name="payType" value="install_chailease" checked={payType==='install_chailease'} onChange={e=>setPayType(e.target.value)} /><span className="font-bold">中租分期</span></label><label className="flex items-center space-x-2 bg-white p-3 rounded border"><input type="radio" name="payType" value="install_cash" checked={payType==='install_cash'} onChange={e=>setPayType(e.target.value)} /><span className="font-bold">現金分期</span></label></div>{payType === 'cash' && <input type="number" value={totalRevenue} onChange={e=>setTotalRevenue(e.target.value)} placeholder="輸入總入帳金額" className="w-full border p-3 rounded text-lg font-bold text-green-700" />}{payType === 'install_chailease' && <div className="bg-white p-3 rounded border"><span className="text-sm">發票金額:</span><input type="number" value={totalRevenue} onChange={e=>setTotalRevenue(e.target.value)} className="border p-1 w-32 ml-2 font-bold"/></div>}{payType === 'install_cash' && <div className="bg-white p-3 rounded border space-y-3"><input type="number" value={totalRevenue} onChange={e=>setTotalRevenue(e.target.value)} className="w-full border p-1 font-bold" placeholder="總金額"/><div className="grid grid-cols-2 gap-2"><input type="number" placeholder="頭款" value={cashInstData.initial} onChange={e=>setCashInstData({...cashInstData, initial:e.target.value})} className="border p-1"/><input type="number" placeholder="尾款" value={cashInstData.remaining} onChange={e=>setCashInstData({...cashInstData, remaining:e.target.value})} className="border p-1"/></div></div>}</div>
                            <div className={`p-4 rounded border-l-4 bg-gray-50 border-gray-400`}><div className="flex justify-between items-center mb-2"><h4 className="font-bold text-gray-700">開辦費支出 (預算: ${settings.constants.setupBudget.toLocaleString()})</h4><span className={settings.constants.setupBudget-setupTotal < 0 ? 'text-red-600 font-bold' : 'text-green-600 text-sm'}>剩餘: ${(settings.constants.setupBudget-setupTotal).toLocaleString()}</span></div><div className="flex gap-2 mb-2"><input type="text" placeholder="項目" value={tempExpName} onChange={e=>setTempExpName(e.target.value)} className="border p-2 flex-1 rounded"/><input type="number" placeholder="金額" className="w-24 border p-2 rounded" value={tempExpAmount} onChange={e=>setTempExpAmount(e.target.value)}/><button onClick={addSetupExpense} className="bg-gray-200 px-4 rounded font-bold text-gray-600">+</button></div><div className="text-sm max-h-32 overflow-y-auto bg-white p-2 border rounded">{setupExpenses.map(i=><div key={i.id} className="flex justify-between border-b border-gray-100 py-1"><span>{i.name}</span><span>${i.amount} <button onClick={()=>removeSetupExpense(i.id)} className="text-red-500 ml-2">x</button></span></div>)}</div></div>
                            <div className="bg-blue-50 p-4 rounded border-l-4 border-blue-500"><h4 className="font-bold text-blue-700 mb-4">加盟贈送清單</h4><div className="grid grid-cols-2 gap-4 mb-4"><div><label className="text-xs font-bold">器材/常溫出貨</label><input type="date" value={equipDate} onChange={e=>setEquipDate(e.target.value)} className="border p-2 w-full rounded"/></div><div><label className="text-xs font-bold text-blue-600">冷凍出貨</label><input type="date" value={frozenDate} onChange={e=>setFrozenDate(e.target.value)} className="border p-2 w-full rounded"/></div></div><div className="h-60 overflow-y-auto text-xs bg-white p-2 border rounded space-y-1">{starterPack.map((p, idx)=>(<div key={idx} className="flex justify-between items-center border-b pb-1"><span className={p.type==='frozen'?'text-blue-600':p.type==='equipment'?'text-orange-600 font-bold':'text-gray-700'}>{p.name}</span><div className="flex items-center"><input type="number" value={p.qty} onChange={(e)=>updateStarterQty(idx, e.target.value)} className="w-10 border text-center mr-1 rounded" /><span className="text-gray-500">{p.unit}</span></div></div>))}</div></div>
                            {!isReadonly && <button onClick={handleFranchiseSubmit} className="w-full bg-indigo-600 text-white py-4 rounded-lg font-bold text-lg shadow-lg">確認建立加盟資料</button>}
                        </div>
                    ) : (
                        <div className="space-y-4 animate-fade-in">
                            {transactions.filter(t=>t.type==='加盟').map(t=>(
                                <div key={t.id} className="border p-4 bg-white relative shadow-sm cursor-pointer hover:bg-gray-50 rounded-lg" onClick={()=>{setSelectedFranchiseId(t.id);setTrackerData(t.franchiseData)}}>
                                    <div className="flex justify-between items-center mb-2"><div className="flex items-center space-x-2"><span className="font-bold text-lg text-indigo-700">{t.franchise}</span><span className="text-xs bg-gray-200 px-2 py-0.5 rounded text-gray-600">{t.date}</span></div><div className="text-right"><div className="font-bold text-green-600">${t.income.toLocaleString()}</div></div></div>
                                    <div className="grid grid-cols-2 gap-2 text-sm text-gray-500"><div>付款: {t.franchiseData.payType==='cash'?'現金':t.franchiseData.payType==='install_chailease'?'中租':'現金分期'}</div><div>器材: {t.franchiseData.equipDate||'未定'}</div><div>冷凍: {t.franchiseData.frozenDate||'未定'}</div></div>
                                    {!isReadonly && <button onClick={(e)=>{e.stopPropagation(); onDelete(t.id, t.type)}} className="absolute top-2 right-2 text-gray-300 hover:text-red-500 p-2"><i className="fa-solid fa-trash-can"></i></button>}
                                </div>
                            ))}
                            {selectedFranchiseId && trackerData && (
                                <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-[60]">
                                    <div className="bg-white p-6 w-full max-w-lg rounded-xl shadow-2xl overflow-y-auto max-h-[90vh]">
                                        <div className="flex justify-between items-center mb-4 border-b pb-2"><h3 className="font-bold text-xl">追蹤: {trackerData.fName}</h3><button onClick={()=>setSelectedFranchiseId(null)} className="text-gray-400 hover:text-gray-600">x</button></div>
                                        <div className={`space-y-6 ${isReadonly ? 'readonly-mode' : ''}`}>
                                            <div className="bg-blue-50 p-3 rounded border border-blue-100"><h4 className="font-bold text-sm text-blue-700 mb-2">出貨進度補登</h4><div className="grid grid-cols-2 gap-4"><div><label className="text-xs font-bold text-gray-500">器材/常溫</label><input type="date" value={trackerData.equipDate} onChange={e=>setTrackerData({...trackerData, equipDate:e.target.value})} className="border p-2 w-full rounded bg-white"/></div><div><label className="text-xs font-bold text-blue-500">冷凍出貨</label><input type="date" value={trackerData.frozenDate} onChange={e=>setTrackerData({...trackerData, frozenDate:e.target.value})} className="border p-2 w-full rounded bg-white"/></div></div></div>
                                            <div className="bg-red-50 p-3 rounded border border-red-100"><div className="flex justify-between items-center mb-2"><h4 className="font-bold text-sm text-red-700">開辦費補登</h4><span className={`text-xs ${trackerSetupTotal > settings.constants.setupBudget ? 'text-red-600 font-bold' : 'text-green-600'}`}>{trackerSetupTotal > settings.constants.setupBudget ? `已超支` : `剩餘 $${(settings.constants.setupBudget-trackerSetupTotal).toLocaleString()}`}</span></div><div className="flex gap-2 mb-2"><input type="text" placeholder="項目" value={newTrackerExpName} onChange={e=>setNewTrackerExpName(e.target.value)} className="border p-2 flex-1 rounded text-sm"/><input type="number" placeholder="金額" className="w-20 border p-2 rounded text-sm" value={newTrackerExpAmount} onChange={e=>setNewTrackerExpAmount(e.target.value)}/><button onClick={addTrackerExpense} className="bg-red-500 text-white px-3 rounded text-sm font-bold">新增</button></div><div className="max-h-32 overflow-y-auto text-sm bg-white border p-1 rounded">{(trackerData.setupExpenses||[]).map((exp, idx) => (<div key={idx} className="flex justify-between py-1 border-b border-gray-100 px-2"><span>{exp.name}</span><span>${exp.amount.toLocaleString()}</span></div>))}</div></div>
                                        </div>
                                        <div className="flex gap-3 mt-6">
                                            {!isReadonly && <button onClick={saveTrackerChanges} className="flex-1 bg-indigo-600 text-white py-3 rounded-lg font-bold">儲存變更</button>}
                                            <button onClick={()=>setSelectedFranchiseId(null)} className="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg font-bold">取消關閉</button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const ReportTab = ({ transactions, onDelete, items, role }) => {
            const isReadonly = role === ROLES.VIEWER;
            // 新增這兩個狀態來控制畫面呈現與報告分類
            const [viewMode, setViewMode] = useState('dashboard'); // 'dashboard' | 'monthly'
            const [reportCategory, setReportCategory] = useState('all'); // 'all', 'shipment', 'direct', 'franchise'

            const [start, setStart] = useState(moment().startOf('month').format('YYYY-MM-DD'));
            const [end, setEnd] = useState(moment().endOf('month').format('YYYY-MM-DD'));
            const [filterType, setFilterType] = useState('all');
            const expenseChartRef = useRef(null); const franchiseChartRef = useRef(null);
            const expenseChart = useRef(null); const franchiseChart = useRef(null);

            const allTransInRange = useMemo(() => transactions.filter(t => moment(t.date).isBetween(start, end, 'day', '[]')), [transactions, start, end]);
            const displayTrans = useMemo(() => {
                let list = allTransInRange;
                if(filterType !== 'all') {
                    if (filterType === 'order') list = list.filter(t => t.type === '出貨');
                    else if (filterType === 'transfer') list = list.filter(t => t.type === '調撥');
                    else if (filterType === 'stockIn') list = list.filter(t => t.type === '進貨/支出' || t.type === '庫存校正');
                    else if (filterType === 'franchise') list = list.filter(t => t.type === '加盟');
                }
                return list.sort((a, b) => b.id - a.id);
            }, [allTransInRange, filterType]);

            const stats = useMemo(() => {
                let s = { shipmentRev: 0, shipmentCost: 0, shipmentMargin: 0, transferCost: 0, franchiseRev: 0, franchiseCost: 0, franchiseProfit: 0, franchiseTaxTotal: 0, expenses: 0, directStoreSales: 0, directStoreExp: 0, directStoreCost: 0, directStoreNet: 0 };
                allTransInRange.forEach(t => {
                    if (t.type === '出貨') { s.shipmentRev += t.income; s.shipmentCost += t.cost; } 
                    else if (t.type === '調撥') { s.transferCost += t.cost; }
                    else if (t.type === '加盟') { s.franchiseRev += t.income; s.franchiseCost += t.cost; s.franchiseProfit += t.profit; if(t.franchiseData && t.franchiseData.chaileaseTax) { s.franchiseTaxTotal += t.franchiseData.chaileaseTax; } } 
                    else if (t.type === '進貨/支出') { if (t.rawExpenses > 0) { s.expenses += t.rawExpenses; } else { const match = t.content.match(/雜支:.*?\$([\d,]+)/); if (match) s.expenses += parseFloat(match[1].replace(/,/g, '')); } } 
                    else if (t.type === '直營報表') { s.directStoreSales += t.income; const expense = t.rawExpenses || 0; const cogs = t.cost - expense; s.directStoreExp += expense; s.directStoreCost += cogs; }
                });
                s.shipmentMargin = s.shipmentRev - s.shipmentCost; s.directStoreNet = s.directStoreSales - (s.directStoreExp + s.directStoreCost); return s;
            }, [allTransInRange]);

            const companyNetProfit = (stats.shipmentRev + stats.franchiseRev + stats.directStoreSales) - (stats.shipmentCost + stats.franchiseCost + stats.transferCost + stats.expenses + stats.directStoreExp + stats.directStoreCost);
            
            // 新增：月結報表資料處理
            const monthlyData = useMemo(() => {
                const grouped = {};
                const totals = {
                    shipment: { rev: 0, cost: 0, profit: 0 },
                    direct: { rev: 0, cost: 0, profit: 0 },
                    franchise: { rev: 0, cost: 0, profit: 0 }
                };

                allTransInRange.forEach(t => {
                    const month = moment(t.date).format('YYYY-MM');
                    if (!grouped[month]) {
                        grouped[month] = {
                            shipment: { rev: 0, cost: 0, profit: 0 },
                            direct: { rev: 0, cost: 0, profit: 0 },
                            franchise: { rev: 0, cost: 0, profit: 0 }
                        };
                    }

                    if (t.type === '出貨') {
                        grouped[month].shipment.rev += t.income;
                        grouped[month].shipment.cost += t.cost;
                        grouped[month].shipment.profit += t.profit;

                        totals.shipment.rev += t.income;
                        totals.shipment.cost += t.cost;
                        totals.shipment.profit += t.profit;
                    } else if (t.type === '直營報表') {
                        grouped[month].direct.rev += t.income;
                        const expense = t.rawExpenses || 0;
                        const cogs = t.cost - expense;
                        const totalCost = expense + cogs;
                        
                        grouped[month].direct.cost += totalCost;
                        grouped[month].direct.profit += (t.income - totalCost);

                        totals.direct.rev += t.income;
                        totals.direct.cost += totalCost;
                        totals.direct.profit += (t.income - totalCost);
                    } else if (t.type === '加盟') {
                        grouped[month].franchise.rev += t.income;
                        grouped[month].franchise.cost += t.cost;
                        grouped[month].franchise.profit += t.profit;

                        totals.franchise.rev += t.income;
                        totals.franchise.cost += t.cost;
                        totals.franchise.profit += t.profit;
                    }
                });

                return {
                    months: Object.keys(grouped).sort((a,b) => b.localeCompare(a)), // 降序排列
                    grouped,
                    totals
                };
            }, [allTransInRange]);

            const getGrandTotal = () => {
                let rev = 0, cost = 0, profit = 0;
                if (reportCategory === 'all' || reportCategory === 'shipment') {
                    rev += monthlyData.totals.shipment.rev; cost += monthlyData.totals.shipment.cost; profit += monthlyData.totals.shipment.profit;
                }
                if (reportCategory === 'all' || reportCategory === 'direct') {
                    rev += monthlyData.totals.direct.rev; cost += monthlyData.totals.direct.cost; profit += monthlyData.totals.direct.profit;
                }
                if (reportCategory === 'all' || reportCategory === 'franchise') {
                    rev += monthlyData.totals.franchise.rev; cost += monthlyData.totals.franchise.cost; profit += monthlyData.totals.franchise.profit;
                }
                return { rev, cost, profit };
            };


            const expenseBreakdown = useMemo(() => {
                const map = {};
                allTransInRange.forEach(t => {
                    if (t.type === '進貨/支出') { const match = t.content.match(/【其他費用】\n(.*?): \$([\d,]+)/); if (match) { const name = match[1].trim(); if (!name.includes('加盟器材')) { map[name] = (map[name] || 0) + parseFloat(match[2].replace(/,/g, '')); } } else if (t.content.match(/雜支: (.*?) \$([\d,]+)/)) { const m = t.content.match(/雜支: (.*?) \$([\d,]+)/); map[m[1]] = (map[m[1]] || 0) + parseFloat(m[2].replace(/,/g, '')); } } 
                    else if (t.type === '直營報表' && t.rawExpenses > 0) map['直營店-營運支出'] = (map['直營店-營運支出'] || 0) + t.rawExpenses; 
                    else if (t.type === '加盟' && t.franchiseData) { if (t.franchiseData.setupExpenses) t.franchiseData.setupExpenses.forEach(e => map['加盟開辦費'] = (map['加盟開辦費'] || 0) + e.amount); if (t.franchiseData.starterCost > 0) map['加盟-贈品成本'] = (map['加盟-贈品成本'] || 0) + t.franchiseData.starterCost; if (t.franchiseData.chaileaseTax > 0) map['加盟-隱形稅額'] = (map['加盟-隱形稅額'] || 0) + t.franchiseData.chaileaseTax; if (t.franchiseData.chaileaseFee > 0) map['加盟-中租手續費'] = (map['加盟-中租手續費'] || 0) + t.franchiseData.chaileaseFee; } 
                    else if (t.type === '出貨' && Number(t.shipping) > 0) map['物流運費成本'] = (map['物流運費成本'] || 0) + Number(t.shipping);
                });
                return map;
            }, [allTransInRange]);

            const frozenStats = useMemo(() => {
                const targetIds = ['cut', 'squid', 'shrimp', 'burdock']; const totalQty = { 'cut': 0, 'squid': 0, 'shrimp': 0, 'burdock': 0 }; const franchiseMap = {};
                allTransInRange.forEach(t => { if(t.type === '出貨' && t.franchise && t.franchise !== '湳雅直營店' && t.rawItems) { if(!franchiseMap[t.franchise]) franchiseMap[t.franchise] = { cut:0, squid:0, shrimp:0, burdock:0 }; t.rawItems.forEach(item => { if(targetIds.includes(item.id)) { totalQty[item.id] += item.qty; franchiseMap[t.franchise][item.id] += (item.qty * item.price); } }); } });
                return { totalQty, franchiseMap };
            }, [allTransInRange]);

            useEffect(() => {
                if(viewMode === 'dashboard') {
                    if(expenseChart.current) expenseChart.current.destroy(); if(franchiseChart.current) franchiseChart.current.destroy();
                    if (expenseChartRef.current) expenseChart.current = new Chart(expenseChartRef.current, { type: 'pie', data: { labels: Object.keys(expenseBreakdown), datasets: [{ data: Object.values(expenseBreakdown), backgroundColor: ['#ef4444', '#f97316', '#eab308', '#84cc16', '#06b6d4', '#6366f1'] }] }, options: { plugins: { title: { display: true, text: '公司總支出分布' }, legend: { position: 'bottom' } } } });
                    if (franchiseChartRef.current) { const franchises = Object.keys(frozenStats.franchiseMap); franchiseChart.current = new Chart(franchiseChartRef.current, { type: 'bar', data: { labels: franchises, datasets: [ { label: '花枝($)', data: franchises.map(f => frozenStats.franchiseMap[f].cut), backgroundColor: '#3b82f6', stack:'0' }, { label: '墨魚($)', data: franchises.map(f => frozenStats.franchiseMap[f].squid), backgroundColor: '#1d4ed8', stack:'0' }, { label: '蝦球($)', data: franchises.map(f => frozenStats.franchiseMap[f].shrimp), backgroundColor: '#60a5fa', stack:'0' }, { label: '牛蒡($)', data: franchises.map(f => frozenStats.franchiseMap[f].burdock), backgroundColor: '#93c5fd', stack:'0' } ] }, options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, plugins: { title: { display: true, text: '各加盟店四大冷凍品進貨金額' }, legend: { position: 'bottom' } } } }); }
                }
            }, [expenseBreakdown, frozenStats, viewMode]);

            return (
                <div className="space-y-6">
                    <div className="flex space-x-2 border-b mb-4">
                        <button onClick={()=>setViewMode('dashboard')} className={`pb-2 px-4 ${viewMode==='dashboard'?'border-b-2 border-indigo-600 font-bold text-indigo-600':'text-gray-500'}`}>總覽儀表板</button>
                        <button onClick={()=>setViewMode('monthly')} className={`pb-2 px-4 ${viewMode==='monthly'?'border-b-2 border-indigo-600 font-bold text-indigo-600':'text-gray-500'}`}>區間月結報表</button>
                    </div>

                    <div className="bg-white p-4 rounded shadow flex items-center gap-4">
                        <h2 className="font-bold">區間選擇</h2>
                        <input type="date" value={start} onChange={e => setStart(e.target.value)} className="border p-1 rounded" />
                        <span>to</span>
                        <input type="date" value={end} onChange={e => setEnd(e.target.value)} className="border p-1 rounded" />
                    </div>
                    
                    {viewMode === 'dashboard' ? (
                        <div className="space-y-6 animate-fade-in">
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                <div className="bg-blue-50 p-3 rounded shadow border-l-4 border-blue-500"><div className="text-xs text-gray-500 font-bold mb-1">加盟出貨</div><div className="flex justify-between items-baseline"><span className="text-xs text-gray-400">總計</span><span className="text-lg font-bold text-blue-700">${stats.shipmentRev.toLocaleString()}</span></div><div className="flex justify-between items-baseline"><span className="text-xs text-gray-400">毛利</span><span className="text-sm font-bold text-green-600">+${stats.shipmentMargin.toLocaleString()}</span></div></div>
                                <div className="bg-cyan-50 p-3 rounded shadow border-l-4 border-cyan-500"><div className="text-xs text-gray-500 font-bold mb-1">直營店 (湳雅)</div><div className="flex justify-between items-baseline"><span className="text-xs text-gray-400">業績</span><span className="text-lg font-bold text-cyan-700">${stats.directStoreSales.toLocaleString()}</span></div><div className="flex justify-between items-baseline"><span className="text-xs text-gray-400">總支出</span><span className="text-sm text-red-400">-${(stats.directStoreExp + stats.directStoreCost).toLocaleString()}</span></div><div className="border-t border-cyan-200 mt-1 pt-1 flex justify-between"><span className="text-xs font-bold">淨利</span><span className={`text-sm font-bold ${stats.directStoreNet>=0?'text-green-600':'text-red-600'}`}>${stats.directStoreNet.toLocaleString()}</span></div></div>
                                <div className="bg-indigo-50 p-3 rounded shadow border-l-4 border-indigo-500"><div className="text-xs text-gray-500 font-bold mb-1">加盟開通</div><div className="flex justify-between items-baseline"><span className="text-xs text-gray-400">收入</span><span className="text-lg font-bold text-indigo-700">${stats.franchiseRev.toLocaleString()}</span></div><div className="flex justify-between items-baseline"><span className="text-xs text-gray-400">成本</span><span className="text-sm text-red-400">-${stats.franchiseCost.toLocaleString()}</span></div>{stats.franchiseTaxTotal > 0 && <div className="text-[10px] text-red-500 font-bold text-right mt-1">含發票稅額: ${stats.franchiseTaxTotal.toLocaleString()}</div>}<div className="border-t border-indigo-200 mt-1 pt-1 flex justify-between"><span className="text-xs font-bold">損益</span><span className="text-sm font-bold text-indigo-600">+${stats.franchiseProfit.toLocaleString()}</span></div></div>
                                <div className="bg-yellow-50 p-3 rounded shadow border-l-4 border-yellow-500 flex flex-col justify-center"><div className="text-xs text-gray-500 font-bold mb-2">公司總淨利 (Net Profit)</div><div className={`text-2xl font-bold ${companyNetProfit>=0?'text-yellow-700':'text-red-600'}`}>${companyNetProfit.toLocaleString()}</div><div className="text-[10px] text-gray-400 mt-1">扣除調撥/營運雜支/直營成本</div></div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="bg-white p-4 rounded shadow h-[350px]"><canvas ref={expenseChartRef}></canvas></div>
                                <div className="bg-white p-4 rounded shadow h-[350px] flex flex-col"><div className="flex gap-2 text-xs font-bold text-gray-500 mb-2 justify-center bg-gray-50 p-2 rounded"><span>花枝: {frozenStats.totalQty.cut}箱</span><span>墨魚: {frozenStats.totalQty.squid}箱</span><span>蝦球: {frozenStats.totalQty.shrimp}箱</span><span>牛蒡: {frozenStats.totalQty.burdock}箱</span></div><div className="flex-1 relative"><canvas ref={franchiseChartRef}></canvas></div></div>
                            </div>

                            <div className="bg-white p-4 rounded shadow">
                                <div className="flex justify-between items-center mb-4 border-b pb-2">
                                    <h3 className="font-bold text-gray-700">交易流水帳</h3>
                                    <select value={filterType} onChange={e=>setFilterType(e.target.value)} className="border p-1 rounded text-sm"><option value="all">全部顯示</option><option value="order">出貨紀錄</option><option value="transfer">調撥紀錄</option><option value="stockIn">進貨/支出</option><option value="franchise">加盟開通</option></select>
                                </div>
                                <div className="space-y-2 max-h-[500px] overflow-y-auto">
                                    {displayTrans.map(t => (
                                        <div key={t.id} className="border rounded p-3 text-sm relative hover:bg-gray-50">
                                            <div className="flex justify-between font-bold mb-1">
                                                <span className="flex items-center gap-2">
                                                    <span className={`px-2 py-0.5 rounded text-white text-xs ${t.type==='出貨'?'bg-blue-500':t.type==='直營報表'?'bg-cyan-500':t.type==='加盟'?'bg-indigo-500':t.type==='進貨/支出'?'bg-red-500':'bg-gray-500'}`}>{t.type}</span>
                                                    <span>{t.date}</span>
                                                    <span className="text-gray-600">- {t.franchise}</span>
                                                    {t.createdBy && <span className="text-[10px] text-gray-400 ml-2">({t.createdBy.split('@')[0]})</span>}
                                                </span>
                                                <span className={t.total < 0 ? 'text-red-500' : 'text-green-600'}>${t.total?.toLocaleString()}</span>
                                            </div>
                                            <pre className="text-xs text-gray-500 whitespace-pre-wrap font-sans bg-gray-100 p-2 rounded">{t.content}</pre>
                                            {!isReadonly && <button onClick={() => onDelete(t.id, t.type)} className="absolute top-3 right-3 text-gray-300 hover:text-red-500"><i className="fa-solid fa-trash"></i></button>}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="bg-white p-4 rounded shadow animate-fade-in">
                            <div className="flex justify-between items-center mb-4 border-b pb-2">
                                <h3 className="font-bold text-gray-700">區間月結報表 <span className="text-sm font-normal text-gray-500 ml-2">依照所選日期進行分類與分月呈現</span></h3>
                                <select value={reportCategory} onChange={e=>setReportCategory(e.target.value)} className="border p-1 rounded text-sm bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-bold">
                                    <option value="all">綜合檢視 (全部)</option>
                                    <option value="shipment">僅顯示：出貨報表</option>
                                    <option value="direct">僅顯示：直營報表</option>
                                    <option value="franchise">僅顯示：加盟開通</option>
                                </select>
                            </div>

                            {/* 總結算區塊 */}
                            <div className="bg-slate-50 p-4 rounded-lg border mb-6">
                                <div className="flex justify-between items-center mb-4">
                                    <h4 className="font-bold text-slate-700">區間總結算明細 ({start} ~ {end})</h4>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    { (reportCategory === 'all' || reportCategory === 'shipment') && (
                                        <div className="bg-white p-3 rounded shadow-sm border-l-4 border-blue-500">
                                            <div className="text-xs font-bold text-gray-500 mb-2">出貨總計</div>
                                            <div className="flex justify-between"><span className="text-gray-500 text-sm">營收:</span><span className="font-bold text-gray-700">${monthlyData.totals.shipment.rev.toLocaleString()}</span></div>
                                            <div className="flex justify-between"><span className="text-gray-500 text-sm">成本:</span><span className="font-bold text-red-500">-${monthlyData.totals.shipment.cost.toLocaleString()}</span></div>
                                            <div className="flex justify-between border-t mt-2 pt-2"><span className="text-gray-500 text-sm font-bold">淨利:</span><span className="font-bold text-blue-600">${monthlyData.totals.shipment.profit.toLocaleString()}</span></div>
                                        </div>
                                    )}
                                    { (reportCategory === 'all' || reportCategory === 'direct') && (
                                        <div className="bg-white p-3 rounded shadow-sm border-l-4 border-cyan-500">
                                            <div className="text-xs font-bold text-gray-500 mb-2">直營總計</div>
                                            <div className="flex justify-between"><span className="text-gray-500 text-sm">營收:</span><span className="font-bold text-gray-700">${monthlyData.totals.direct.rev.toLocaleString()}</span></div>
                                            <div className="flex justify-between"><span className="text-gray-500 text-sm">成本(含雜支):</span><span className="font-bold text-red-500">-${monthlyData.totals.direct.cost.toLocaleString()}</span></div>
                                            <div className="flex justify-between border-t mt-2 pt-2"><span className="text-gray-500 text-sm font-bold">淨利:</span><span className={`font-bold ${monthlyData.totals.direct.profit >= 0 ? 'text-green-600' : 'text-red-600'}`}>${monthlyData.totals.direct.profit.toLocaleString()}</span></div>
                                        </div>
                                    )}
                                    { (reportCategory === 'all' || reportCategory === 'franchise') && (
                                        <div className="bg-white p-3 rounded shadow-sm border-l-4 border-indigo-500">
                                            <div className="text-xs font-bold text-gray-500 mb-2">加盟開通總計</div>
                                            <div className="flex justify-between"><span className="text-gray-500 text-sm">營收:</span><span className="font-bold text-gray-700">${monthlyData.totals.franchise.rev.toLocaleString()}</span></div>
                                            <div className="flex justify-between"><span className="text-gray-500 text-sm">成本(含隱形):</span><span className="font-bold text-red-500">-${monthlyData.totals.franchise.cost.toLocaleString()}</span></div>
                                            <div className="flex justify-between border-t mt-2 pt-2"><span className="text-gray-500 text-sm font-bold">淨利:</span><span className="font-bold text-indigo-600">${monthlyData.totals.franchise.profit.toLocaleString()}</span></div>
                                        </div>
                                    )}
                                </div>

                                {/* 單一過濾的加總儀表板 */}
                                {(() => {
                                    const grand = getGrandTotal();
                                    return (
                                        <div className="mt-4 p-3 bg-indigo-100 rounded border border-indigo-200 flex flex-col md:flex-row justify-between items-center shadow-inner">
                                            <span className="font-bold text-indigo-800 mb-2 md:mb-0">
                                                <i className="fa-solid fa-calculator mr-2"></i>
                                                選定範圍與項目總結算 ({reportCategory === 'all' ? '出貨+直營+加盟' : reportCategory === 'shipment' ? '出貨' : reportCategory === 'direct' ? '直營' : '加盟'})
                                            </span>
                                            <div className="flex space-x-6">
                                                <span className="text-sm">總營收: <span className="font-bold text-indigo-700 text-base">${grand.rev.toLocaleString()}</span></span>
                                                <span className="text-sm">總成本: <span className="font-bold text-red-500 text-base">-${grand.cost.toLocaleString()}</span></span>
                                                <span className="text-sm font-bold bg-white px-2 py-0.5 rounded shadow-sm">
                                                    總淨利: <span className={`text-base ${grand.profit >= 0 ? 'text-green-600' : 'text-red-600'}`}>${grand.profit.toLocaleString()}</span>
                                                </span>
                                            </div>
                                        </div>
                                    );
                                })()}
                            </div>

                            {/* 每月明細 */}
                            <div className="space-y-4">
                                <h4 className="font-bold text-gray-700">每月分組明細</h4>
                                {monthlyData.months.map(month => (
                                    <div key={month} className="border border-gray-200 rounded-lg overflow-hidden shadow-sm">
                                        <div className="bg-gray-100 p-2 font-bold text-gray-700 border-b flex items-center">
                                            <i className="fa-regular fa-calendar-alt mr-2 text-gray-500"></i> {month}
                                        </div>
                                        <div className="p-3 bg-white grid grid-cols-1 md:grid-cols-3 gap-6">
                                            { (reportCategory === 'all' || reportCategory === 'shipment') && (
                                                <div>
                                                    <div className="text-xs font-bold text-blue-600 mb-2 pb-1 border-b border-blue-100">出貨報表</div>
                                                    <div className="text-sm flex justify-between mb-1"><span className="text-gray-500">營收:</span><span className="font-medium">${monthlyData.grouped[month].shipment.rev.toLocaleString()}</span></div>
                                                    <div className="text-sm flex justify-between mb-1"><span className="text-gray-500">成本:</span><span className="text-red-400">-${monthlyData.grouped[month].shipment.cost.toLocaleString()}</span></div>
                                                    <div className="text-sm flex justify-between font-bold pt-1 mt-1 border-t border-dashed"><span className="text-gray-600">淨利:</span><span className="text-blue-600">${monthlyData.grouped[month].shipment.profit.toLocaleString()}</span></div>
                                                </div>
                                            )}
                                            { (reportCategory === 'all' || reportCategory === 'direct') && (
                                                <div>
                                                    <div className="text-xs font-bold text-cyan-600 mb-2 pb-1 border-b border-cyan-100">直營報表</div>
                                                    <div className="text-sm flex justify-between mb-1"><span className="text-gray-500">營收:</span><span className="font-medium">${monthlyData.grouped[month].direct.rev.toLocaleString()}</span></div>
                                                    <div className="text-sm flex justify-between mb-1"><span className="text-gray-500">成本:</span><span className="text-red-400">-${monthlyData.grouped[month].direct.cost.toLocaleString()}</span></div>
                                                    <div className="text-sm flex justify-between font-bold pt-1 mt-1 border-t border-dashed"><span className="text-gray-600">淨利:</span><span className={monthlyData.grouped[month].direct.profit >= 0 ? 'text-green-600' : 'text-red-600'}>${monthlyData.grouped[month].direct.profit.toLocaleString()}</span></div>
                                                </div>
                                            )}
                                            { (reportCategory === 'all' || reportCategory === 'franchise') && (
                                                <div>
                                                    <div className="text-xs font-bold text-indigo-600 mb-2 pb-1 border-b border-indigo-100">加盟開通</div>
                                                    <div className="text-sm flex justify-between mb-1"><span className="text-gray-500">營收:</span><span className="font-medium">${monthlyData.grouped[month].franchise.rev.toLocaleString()}</span></div>
                                                    <div className="text-sm flex justify-between mb-1"><span className="text-gray-500">成本:</span><span className="text-red-400">-${monthlyData.grouped[month].franchise.cost.toLocaleString()}</span></div>
                                                    <div className="text-sm flex justify-between font-bold pt-1 mt-1 border-t border-dashed"><span className="text-gray-600">淨利:</span><span className="text-indigo-600">${monthlyData.grouped[month].franchise.profit.toLocaleString()}</span></div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ))}
                                {monthlyData.months.length === 0 && (
                                    <div className="text-center text-gray-400 p-8 border-2 border-dashed border-gray-200 rounded-lg">
                                        <i className="fa-regular fa-folder-open text-2xl mb-2"></i>
                                        <p>此區間內沒有符合條件的報表資料</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const SettingsTab = ({ settings, onSave, role }) => {
            const isReadonly = role === ROLES.VIEWER;
            const [localSettings, setLocalSettings] = useState(settings ? JSON.parse(JSON.stringify(settings)) : null);
            useEffect(() => { if(settings) setLocalSettings(JSON.parse(JSON.stringify(settings))); }, [settings]);
            if (!localSettings) return <div>載入中...</div>;
            const handleItemChange = (index, field, value) => { const newItems = [...localSettings.items]; newItems[index][field] = field === 'cost' || field === 'price' ? Number(value) : value; setLocalSettings({ ...localSettings, items: newItems }); };
            const addNewItem = () => { const newItem = { id: `item_${Date.now()}`, name: '新商品', category: '其他', cost: 0, price: 0, unit: '個', isBox: false }; setLocalSettings({ ...localSettings, items: [...localSettings.items, newItem] }); };
            const removeItem = (index) => { if (confirm('確定要刪除此商品嗎？')) { const newItems = localSettings.items.filter((_, i) => i !== index); setLocalSettings({ ...localSettings, items: newItems }); } };
            const handlePackChange = (index, field, value) => { const newPack = [...localSettings.starterPack]; newPack[index][field] = field === 'qty' ? Number(value) : value; setLocalSettings({ ...localSettings, starterPack: newPack }); };
            const addNewPackItem = () => { const firstItem = localSettings.items[0]; const newPackItem = { name: firstItem.name, qty: 1, unit: firstItem.unit, type: 'dry', id: firstItem.id }; setLocalSettings({ ...localSettings, starterPack: [...localSettings.starterPack, newPackItem] }); };
            const removePackItem = (index) => { if (confirm('確定要移除此贈品嗎？')) { const newPack = localSettings.starterPack.filter((_, i) => i !== index); setLocalSettings({ ...localSettings, starterPack: newPack }); } };
            const handlePackIdChange = (index, newId) => { const item = localSettings.items.find(i => i.id === newId); if(item) { const newPack = [...localSettings.starterPack]; newPack[index] = { ...newPack[index], id: newId, name: item.name, unit: item.unit }; setLocalSettings({ ...localSettings, starterPack: newPack }); } };
            const handleConstantChange = (field, value) => { setLocalSettings({ ...localSettings, constants: { ...localSettings.constants, [field]: Number(value) } }); };
            
            return (
                <div className={`space-y-4 pb-10 ${isReadonly ? 'readonly-mode' : ''}`}>
                    <h3 className="font-bold border-b pb-2">參數設定</h3>
                    <div className="grid grid-cols-2 gap-4 bg-white p-4 shadow rounded mb-4"><div><label className="text-xs">中租合約總額 (基準)</label><input type="number" value={localSettings.constants.chaileaseBase} onChange={e=>handleConstantChange('chaileaseBase', e.target.value)} className="border p-1 w-full"/></div><div><label className="text-xs">中租手續費 (額外)</label><input type="number" value={localSettings.constants.chaileaseFee} onChange={e=>handleConstantChange('chaileaseFee', e.target.value)} className="border p-1 w-full"/></div><div><label className="text-xs">開辦費預算</label><input type="number" value={localSettings.constants.setupBudget} onChange={e=>handleConstantChange('setupBudget', e.target.value)} className="border p-1 w-full"/></div></div>
                    <h3 className="font-bold border-b pb-2">加盟贈送清單預設值</h3>
                    <div className="bg-blue-50 p-4 rounded shadow space-y-2 mb-4 max-h-60 overflow-y-auto">{localSettings.starterPack.map((p, idx) => ( <div key={idx} className="flex gap-2 items-center text-sm border-b border-blue-100 pb-1"> <select value={p.id} onChange={(e)=>handlePackIdChange(idx, e.target.value)} className="border p-1 w-32 truncate"> {localSettings.items.map(i=><option key={i.id} value={i.id}>{i.name}</option>)} </select> <input type="number" value={p.qty} onChange={e=>handlePackChange(idx, 'qty', e.target.value)} className="border p-1 w-16" placeholder="數量"/> <span className="text-gray-500 w-8">{p.unit}</span> <button onClick={()=>removePackItem(idx)} className="text-red-500"><i className="fa-solid fa-times"></i></button> </div> ))} <button onClick={addNewPackItem} className="text-blue-600 text-sm font-bold mt-2">+ 新增贈品項目</button></div>
                    <h3 className="font-bold border-b pb-2">全商品列表</h3>
                    <div className="space-y-2">{(localSettings.items || []).map((item, idx) => ( <div key={item.id} className="flex gap-2 bg-white p-2 rounded shadow-sm items-center"> <input value={item.name} onChange={e=>handleItemChange(idx, 'name', e.target.value)} className="border p-1 w-24 text-sm font-bold"/> <select value={item.category} onChange={e=>handleItemChange(idx, 'category', e.target.value)} className="border p-1 text-sm"><option value="箱裝">箱裝</option><option value="沙拉">沙拉</option><option value="包材">包材</option><option value="其他">其他</option><option value="器材">器材</option></select> <input type="number" value={item.cost} onChange={e=>handleItemChange(idx, 'cost', e.target.value)} className="border p-1 w-16 text-sm" placeholder="成本"/> <input type="number" value={item.price} onChange={e=>handleItemChange(idx, 'price', e.target.value)} className="border p-1 w-16 text-sm" placeholder="售價"/> <button onClick={()=>removeItem(idx)} className="text-red-500 px-2">x</button> </div> ))}</div>
                    <button onClick={addNewItem} className="w-full bg-gray-200 py-2 rounded font-bold">+ 新增商品</button>
                    {!isReadonly && <div className="sticky bottom-4"><button onClick={()=>onSave(localSettings)} className="w-full bg-blue-600 text-white py-3 rounded font-bold shadow-lg">儲存全部設定</button></div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
