<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>加盟進銷存管理系統 Pro v65 (權限協作版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/locale/zh-tw.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 700; }
        .tab-inactive { color: #64748b; font-weight: 500; }
        .num-font { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        /* 針對 View 模式禁用點擊的樣式 */
        .readonly-mode { pointer-events: none; opacity: 0.7; filter: grayscale(20%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        
        if (typeof Chart !== 'undefined' && Chart.register && typeof ChartDataLabels !== 'undefined') {
            Chart.register(ChartDataLabels);
        }

        const firebaseConfig = {
            apiKey: "AIzaSyBEQyeP-aKoi4rzrdMUxeDXexPrm5EdVZM",
            authDomain: "ukaportfinance.firebaseapp.com",
            projectId: "ukaportfinance",
            storageBucket: "ukaportfinance.firebasestorage.app",
            messagingSenderId: "1024449773890",
            appId: "1:1024449773890:web:09f9822449aae305ba88db",
            measurementId: "G-224CPH1PRX"
        };

        if (!firebase.apps.length) {
            try { firebase.initializeApp(firebaseConfig); } catch (e) { console.error("Firebase Init Error:", e); }
        }

        // --- 權限管理設定 ---
        const ROLES = {
            ADMIN: 'admin',       // 管理員：全部權限
            OPERATOR: 'operator', // 操作員：僅直營頁面
            VIEWER: 'viewer'      // 檢視員：僅檢視，無法修改
        };

        const checkUserRole = (email) => {
            if (!email) return ROLES.VIEWER;
            if (email.toLowerCase() === 'a0935505590@gmail.com') return ROLES.OPERATOR;
            if (email.toLowerCase() === 'aa0980115055@gmail.com') return ROLES.VIEWER;
            // 除了上述兩人外，預設將登入者視為管理員 (包含您自己)
            // 若未來需更嚴謹，可將您的 Email 寫死，其他人預設為 Viewer
            return ROLES.ADMIN;
        };
        // ------------------

        const formatBoxQty = (val) => {
            if (val === undefined || val === null) return '0';
            const num = parseFloat(Number(val));
            if (isNaN(num)) return '0';
            const fixedNum = parseFloat(num.toFixed(4));
            const intPart = Math.floor(fixedNum);
            const decPart = fixedNum - intPart;
            const packs = Math.round(decPart * 6);
            if (packs === 0) return intPart.toString();
            if (packs === 6) return (intPart + 1).toString();
            return intPart > 0 ? `${intPart} ${packs}/6` : `${packs}/6`;
        };

        const DEFAULT_SETTINGS = {
            items: [
                { id: 'cut', name: '花枝', category: '箱裝', cost: 3900, price: 5700, unit: '箱', isBox: true },
                { id: 'squid', name: '墨魚', category: '箱裝', cost: 2640, price: 4200, unit: '箱', isBox: true },
                { id: 'shrimp', name: '蝦球', category: '箱裝', cost: 4500, price: 6600, unit: '箱', isBox: true },
                { id: 'burdock', name: '牛蒡', category: '箱裝', cost: 2040, price: 3600, unit: '箱', isBox: true },
                { id: 'cucumber', name: '黃瓜碎', category: '其他', cost: 355, price: 355, unit: '包' },
                { id: 'pepper', name: '椒鹽粉(2斤)', category: '其他', cost: 440, price: 440, unit: '包' },
                { id: 'soul', name: '黯然銷魂粉(2斤)', category: '其他', cost: 600, price: 600, unit: '包' },
                { id: 'chili', name: '青花辣椒粉(1斤)', category: '其他', cost: 380, price: 380, unit: '包' },
                { id: 'salad_orig', name: '原味沙拉', category: '沙拉', cost: 45, price: 45, unit: '包' },
                { id: 'salad_mus', name: '芥末沙拉', category: '沙拉', cost: 60, price: 60, unit: '包' },
                { id: 'salad_honey', name: '蜂蜜沙拉', category: '沙拉', cost: 60, price: 60, unit: '包' },
                { id: 'boat_med', name: '特中(紙袋)', category: '包材', cost: 90, price: 90, unit: '條' },
                { id: 'boat_large', name: '特大(紙袋)', category: '包材', cost: 125, price: 125, unit: '條' },
                { id: 'bamboo', name: '竹籤', category: '包材', cost: 40, price: 40, unit: '包' },
                { id: 'fork', name: '叉匙', category: '包材', cost: 27, price: 27, unit: '包' },
                { id: 'bag', name: '提袋', category: '包材', cost: 22, price: 22, unit: '包' },
                { id: 'tray3', name: '3”船型', category: '包材', cost: 0.5, price: 0.5, unit: '個' },
                { id: 'tray4', name: '4”船型', category: '包材', cost: 0.6, price: 0.6, unit: '個' },
                { id: 'shrimp_chip', name: '蝦餅', category: '其他', cost: 60, price: 60, unit: '包' },
                { id: 'glove', name: '手套', category: '其他', cost: 159, price: 159, unit: '盒' },
                { id: 'equip_set', name: '加盟器材套組', category: '器材', cost: 43200, price: 0, unit: '式' }
            ],
            starterPack: [
                { name: '加盟器材套組', qty: 1, unit: '式', type: 'equipment', id: 'equip_set' },
                { name: '黃瓜碎', qty: 3, unit: '包', type: 'dry', id: 'cucumber' },
                { name: '椒鹽粉(2斤)', qty: 1, unit: '包', type: 'dry', id: 'pepper' },
                { name: '黯然銷魂粉(2斤)', qty: 1, unit: '包', type: 'dry', id: 'soul' },
                { name: '青花辣椒粉(1斤)', qty: 1, unit: '包', type: 'dry', id: 'chili' },
                { name: '原味沙拉', qty: 12, unit: '包', type: 'dry', id: 'salad_orig' },
                { name: '芥末沙拉', qty: 10, unit: '包', type: 'dry', id: 'salad_mus' },
                { name: '蜂蜜沙拉', qty: 10, unit: '包', type: 'dry', id: 'salad_honey' },
                { name: '特中(紙袋)', qty: 3, unit: '條', type: 'dry', id: 'boat_med' },
                { name: '特大(紙袋)', qty: 1, unit: '條', type: 'dry', id: 'boat_large' },
                { name: '竹籤', qty: 5, unit: '包', type: 'dry', id: 'bamboo' },
                { name: '叉匙', qty: 10, unit: '包', type: 'dry', id: 'fork' },
                { name: '提袋', qty: 10, unit: '包', type: 'dry', id: 'bag' },
                { name: '3”船型', qty: 1000, unit: '個', type: 'dry', id: 'tray3' },
                { name: '4”船型', qty: 500, unit: '個', type: 'dry', id: 'tray4' },
                { name: '蝦餅', qty: 10, unit: '包', type: 'dry', id: 'shrimp_chip' },
                { name: '手套', qty: 1, unit: '盒', type: 'dry', id: 'glove' },
                { name: '花枝', qty: 3, unit: '箱', type: 'frozen', id: 'cut' },
                { name: '墨魚', qty: 1, unit: '箱', type: 'frozen', id: 'squid' },
                { name: '蝦球', qty: 1, unit: '箱', type: 'frozen', id: 'shrimp' },
                { name: '牛蒡', qty: 1, unit: '箱', type: 'frozen', id: 'burdock' }
            ],
            constants: {
                chaileaseBase: 240000,
                chaileaseFee: 13200,
                setupBudget: 50000,
                taxRate: 0.05
            }
        };

        const generateFormattedReceipt = (title, date, items, itemMap, extraItems = [], shippingFee = 0) => {
            let text = `${title}\n日期：${date}\n------------------\n`;
            const frozen = items.filter(i => itemMap[i.id]?.isBox || i.type === 'frozen');
            const others = items.filter(i => !(itemMap[i.id]?.isBox || i.type === 'frozen'));

            if (frozen.length > 0) {
                text += `[箱裝]\n`;
                frozen.forEach(item => {
                    text += `${item.name} x ${item.qty}${item.unit} = $${(item.price * item.qty).toLocaleString()}\n`;
                });
            }
            if (others.length > 0) {
                if (frozen.length > 0) text += `\n`;
                text += `[其他品項]\n`;
                others.forEach(item => {
                    text += `${item.name} x ${item.qty}${item.unit} = $${(item.price * item.qty).toLocaleString()}\n`;
                });
            }
            if (shippingFee !== 0 || extraItems.length > 0) {
                text += `\n[其他費用]\n`;
                if(shippingFee !== 0) text += `運費: $${shippingFee}\n`;
                extraItems.forEach(item => {
                    text += `${item.name}: $${item.amount}\n`;
                });
            }
            text += `------------------\n`;
            let grandTotal = 0;
            items.forEach(i => grandTotal += (i.price || 0) * i.qty);
            extraItems.forEach(e => grandTotal += Number(e.amount));
            grandTotal += Number(shippingFee);
            text += `總金額：$${grandTotal.toLocaleString()}`;
            return text;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [role, setRole] = useState(null);
            const [db, setDb] = useState(null);
            const [activeTab, setActiveTab] = useState('order'); 
            const [inventory, setInventory] = useState({});
            const [transactions, setTransactions] = useState([]);
            const [appSettings, setAppSettings] = useState(null);
            const [loading, setLoading] = useState(false);

            useEffect(() => { if (firebase.apps.length) setDb(firebase.firestore()); }, []);

            useEffect(() => {
                const auth = firebase.auth();
                const unsub = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    if (u) {
                        setLoading(true);
                        const userRole = checkUserRole(u.email);
                        setRole(userRole);
                        
                        // 針對 Operator 強制跳到直營頁面
                        if (userRole === ROLES.OPERATOR) setActiveTab('direct');

                        // ⭐ 關鍵修改：將路徑改為全公司共用的路徑，不再使用 user.uid
                        // 這樣所有人存取的都是同一份資料庫
                        const sharedRef = firebase.firestore().collection('company_data').doc('main_system');
                        
                        const unsubTrans = sharedRef.collection('transactions').orderBy('id', 'desc').onSnapshot(snap => {
                            const list = [];
                            snap.forEach(doc => list.push(doc.data()));
                            setTransactions(list);
                        });
                        const unsubInv = sharedRef.collection('data').doc('inventory').onSnapshot(doc => {
                            if (doc.exists) setInventory(doc.data());
                            else sharedRef.collection('data').doc('inventory').set(DEFAULT_SETTINGS.items.reduce((acc, i) => ({...acc, [i.id]: 0}), {}));
                        });
                        const unsubSettings = sharedRef.collection('data').doc('settings').onSnapshot(doc => {
                            if (doc.exists) {
                                const data = doc.data();
                                setAppSettings({
                                    items: data.items || DEFAULT_SETTINGS.items,
                                    constants: { ...DEFAULT_SETTINGS.constants, ...(data.constants || {}) },
                                    starterPack: data.starterPack || DEFAULT_SETTINGS.starterPack
                                });
                            } else {
                                sharedRef.collection('data').doc('settings').set(DEFAULT_SETTINGS);
                                setAppSettings(DEFAULT_SETTINGS);
                            }
                            setLoading(false);
                        });
                        return () => { unsubTrans(); unsubInv(); unsubSettings(); };
                    }
                });
                return () => unsub();
            }, []);

            // 權限攔截器：如果沒有權限就擋下動作
            const checkWritePermission = (actionType = 'general') => {
                if (role === ROLES.VIEWER) {
                    alert('權限不足：您目前的帳號僅有「檢視」權限。');
                    return false;
                }
                if (role === ROLES.OPERATOR && actionType !== 'direct') {
                    alert('權限不足：您的帳號僅能操作「直營」相關功能。');
                    return false;
                }
                return true;
            };

            const updateInventory = (id, change, isSet = false) => {
                if (!user || !db) return;
                if (!checkWritePermission()) return;
                const invRef = db.collection('company_data').doc('main_system').collection('data').doc('inventory');
                if (isSet) {
                     invRef.update({ [id]: change }).catch(() => invRef.set({ [id]: change }, { merge: true }));
                } else {
                     invRef.update({ [id]: firebase.firestore.FieldValue.increment(change) }).catch(() => invRef.set({ [id]: change }, { merge: true }));
                }
            };

            const addTransaction = (record) => {
                if (!user || !db) return;
                // 特殊判斷：Operator 只能發送 直營報表
                const actionType = record.type === '直營報表' ? 'direct' : 'general';
                if (!checkWritePermission(actionType)) return;
                
                // 紀錄是誰建立的
                record.createdBy = user.email;
                db.collection('company_data').doc('main_system').collection('transactions').doc(String(record.id)).set(record);
            };

            const updateTransaction = (id, newFields) => {
                if (!user || !db) return;
                if (!checkWritePermission()) return;
                db.collection('company_data').doc('main_system').collection('transactions').doc(String(id)).update(newFields);
            };

            const deleteTransaction = async (id, type) => {
                if (!user || !db) return;
                const actionType = type === '直營報表' ? 'direct' : 'general';
                if (!checkWritePermission(actionType)) return;

                if (!confirm('確定要刪除此筆資料嗎？\n注意：這將會復原相關的庫存變動。')) return;
                setLoading(true);
                try {
                    const txRef = db.collection('company_data').doc('main_system').collection('transactions').doc(String(id));
                    const doc = await txRef.get();
                    if (!doc.exists) throw new Error('找不到該筆資料');
                    
                    const tx = doc.data();
                    const batch = db.batch();
                    const invRef = db.collection('company_data').doc('main_system').collection('data').doc('inventory');
                    const invUpdates = {};

                    if ((tx.type === '出貨' || tx.type === '調撥' || tx.type === '直營報表') && tx.rawItems) {
                        tx.rawItems.forEach(item => { if (item.id) invUpdates[item.id] = firebase.firestore.FieldValue.increment(item.qty); });
                    } else if (tx.type === '進貨/支出' && tx.rawItems) {
                        tx.rawItems.forEach(item => { 
                             if (item.id) invUpdates[item.id] = firebase.firestore.FieldValue.increment(-item.qty); 
                        });
                    } else if (tx.type === '庫存校正' && tx.rawItems) {
                        tx.rawItems.forEach(item => {
                            if (item.id) invUpdates[item.id] = firebase.firestore.FieldValue.increment(-item.change);
                        });
                    } else if (tx.type === '加盟' && tx.franchiseData && tx.franchiseData.starterPack) {
                        tx.franchiseData.starterPack.forEach(item => {
                            if(item.id !== 'equip_set') invUpdates[item.id] = firebase.firestore.FieldValue.increment(item.qty);
                        });
                    }

                    if (Object.keys(invUpdates).length > 0) batch.update(invRef, invUpdates);
                    batch.delete(txRef);
                    await batch.commit();
                    alert('刪除成功，庫存已還原。');
                } catch (e) { console.error(e); alert('刪除失敗: ' + e.message); } finally { setLoading(false); }
            };

            const saveSettings = (newSettings) => {
                if (!user || !db) return;
                if (!checkWritePermission()) return;
                db.collection('company_data').doc('main_system').collection('data').doc('settings').set(newSettings)
                    .then(() => alert('設定已儲存！'))
                    .catch(err => alert('儲存失敗: ' + err.message));
            };

            const uniqueFranchises = useMemo(() => {
                const set = new Set();
                transactions.forEach(t => { if(t.franchise && t.franchise !== '-') set.add(t.franchise); });
                return Array.from(set);
            }, [transactions]);

            const uniqueExpenseNames = useMemo(() => {
                const set = new Set();
                transactions.forEach(t => { if(t.type === '進貨/支出' && t.content) { const match = t.content.match(/【其他費用】\n(.*?):/); if(match && match[1]) set.add(match[1].trim()); } });
                return Array.from(set);
            }, [transactions]);

            if (!user) return <LoginScreen />;

            // 根據權限過濾可以看見的 Tab
            const ALL_TABS = [
                {id: 'order', label: '出貨/調撥', icon: 'fa-truck'},
                {id: 'stockIn', label: '進貨管理', icon: 'fa-dolly'},
                {id: 'direct', label: '直營(湳雅)', icon: 'fa-store'},
                {id: 'franchise', label: '加盟', icon: 'fa-handshake'},
                {id: 'report', label: '總報表', icon: 'fa-chart-line'},
                {id: 'settings', label: '設定', icon: 'fa-cog'} 
            ];

            const visibleTabs = ALL_TABS.filter(tab => {
                if (role === ROLES.ADMIN) return true;
                if (role === ROLES.VIEWER) return tab.id !== 'settings'; // 檢視者看全部，但隱藏設定
                if (role === ROLES.OPERATOR) return tab.id === 'direct'; // 操作員只能看直營
                return false;
            });

            return (
                <div className="min-h-screen max-w-5xl mx-auto bg-white shadow-xl flex flex-col">
                    <div className="bg-slate-800 text-white p-4 sticky top-0 z-50 shadow-md">
                        <div className="flex justify-between items-center mb-2">
                            <h1 className="text-lg font-bold"><i className="fa-solid fa-cloud mr-2 text-green-400"></i>加盟系統 Pro v65 <span className="text-xs bg-purple-500 px-1 rounded ml-1">多人協作版</span></h1>
                            <div className="flex items-center space-x-2">
                                <span className="text-xs text-slate-300 hidden md:inline">{user.email} ({role})</span>
                                <button onClick={() => firebase.auth().signOut()} className="text-xs bg-slate-700 px-2 py-1 rounded hover:bg-slate-600">登出</button>
                            </div>
                        </div>
                        <div className="flex space-x-1 overflow-x-auto no-scrollbar">
                            {visibleTabs.map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-1 py-2 px-3 rounded-t-lg text-sm whitespace-nowrap transition ${activeTab === tab.id ? 'bg-white text-slate-800 font-bold' : 'text-slate-300 hover:bg-slate-700'}`}>
                                    <i className={`fa-solid ${tab.icon} mr-1`}></i>{tab.label}
                                </button>
                            ))}
                        </div>
                    </div>
                    
                    {/* 若為 Viewer，顯示提示 */}
                    {role === ROLES.VIEWER && (
                        <div className="bg-yellow-100 text-yellow-800 p-2 text-center text-xs font-bold shadow-inner">
                            目前為「純檢視模式」，無法新增或修改任何資料。
                        </div>
                    )}

                    <div className="p-4 mb-20 flex-1 overflow-y-auto">
                        {(loading || !appSettings) && <div className="text-center py-10 text-gray-500"><i className="fa-solid fa-spinner fa-spin mr-2"></i>資料讀取中...</div>}
                        {!loading && appSettings && (
                            <div className="animate-fade-in">
                                {activeTab === 'order' && <OrderTab items={appSettings.items} inventory={inventory} onSubmit={addTransaction} onUpdateInv={updateInventory} franchises={uniqueFranchises} genReceipt={generateFormattedReceipt} role={role} />}
                                {activeTab === 'stockIn' && <StockInTab items={appSettings.items} inventory={inventory} onSubmit={addTransaction} onUpdateInv={updateInventory} expenseNames={uniqueExpenseNames} transactions={transactions} role={role} />}
                                {activeTab === 'direct' && <DirectStoreTab items={appSettings.items} inventory={inventory} onSubmit={addTransaction} onUpdateInv={updateInventory} transactions={transactions} onDelete={deleteTransaction} role={role} />}
                                {activeTab === 'franchise' && <FranchiseTab items={appSettings.items} inventory={inventory} onSubmit={addTransaction} onUpdateInv={updateInventory} onUpdateTrans={updateTransaction} onDelete={deleteTransaction} transactions={transactions} franchises={uniqueFranchises} settings={appSettings} genReceipt={generateFormattedReceipt} role={role} />}
                                {activeTab === 'report' && <ReportTab transactions={transactions} onDelete={deleteTransaction} items={appSettings.items} role={role} />}
                                {activeTab === 'settings' && <SettingsTab settings={appSettings} onSave={saveSettings} role={role} />}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const LoginScreen = () => {
            const [email, setEmail] = useState(''); 
            const [pwd, setPwd] = useState(''); 
            const [mode, setMode] = useState('login'); 
            const [error, setError] = useState(''); 
            const [loading, setLoading] = useState(false);
            
            const handleAuth = async (e) => { 
                e.preventDefault(); 
                if(loading) return; 
                setLoading(true); setError(''); 
                try { 
                    if (mode === 'login') await firebase.auth().signInWithEmailAndPassword(email, pwd); 
                    else await firebase.auth().createUserWithEmailAndPassword(email, pwd); 
                } catch (e) { 
                    setError('登入失敗，請檢查帳號密碼'); setLoading(false); 
                } 
            };

            const handleGoogleLogin = async () => {
                if(loading) return;
                setLoading(true); setError('');
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    // 開啟彈窗登入
                    await firebase.auth().signInWithPopup(provider);
                } catch (e) {
                    setError('Google 登入失敗: ' + e.message);
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
                    <div className="bg-white p-6 rounded-lg shadow-lg max-w-sm w-full">
                        <h2 className="text-2xl font-bold mb-6 text-center text-slate-800">登入系統</h2>
                        
                        {/* Google 登入按鈕 */}
                        <button onClick={handleGoogleLogin} disabled={loading} className="w-full bg-white border border-gray-300 text-gray-700 py-3 rounded font-bold mb-6 flex items-center justify-center hover:bg-gray-50 shadow-sm transition">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" className="w-5 h-5 mr-3"/>
                            使用 Google 帳號登入
                        </button>

                        <div className="flex items-center mb-6">
                            <hr className="flex-1 border-gray-300"/>
                            <span className="px-3 text-xs text-gray-400 font-bold">或使用 Email</span>
                            <hr className="flex-1 border-gray-300"/>
                        </div>

                        <div className="flex bg-gray-200 rounded p-1 mb-4">
                            <button type="button" onClick={()=>setMode('login')} className={`flex-1 py-1 rounded text-sm ${mode==='login'?'bg-white shadow font-bold':''}`}>登入</button>
                            <button type="button" onClick={()=>setMode('register')} className={`flex-1 py-1 rounded text-sm ${mode==='register'?'bg-white shadow font-bold':''}`}>註冊</button>
                        </div>
                        <form onSubmit={handleAuth}>
                            <input type="email" placeholder="Email" className="w-full border p-3 rounded mb-3" value={email} onChange={e=>setEmail(e.target.value)} required/>
                            <input type="password" placeholder="密碼" className="w-full border p-3 rounded mb-4" value={pwd} onChange={e=>setPwd(e.target.value)} required/>
                            {error && <div className="text-red-500 text-xs mb-4">{error}</div>}
                            <button type="submit" disabled={loading} className="w-full bg-indigo-600 text-white py-3 rounded font-bold mb-4">{loading?'處理中...':(mode==='login'?'確認 Email 登入':'確認註冊')}</button>
                        </form>
                    </div>
                </div>
            );
        };

        const DirectStoreTab = ({ items, inventory, onSubmit, onUpdateInv, transactions, onDelete, role }) => {
            const isReadonly = role === ROLES.VIEWER;
            const [view, setView] = useState('manual'); 
            const [selectedMonth, setSelectedMonth] = useState(moment().format('YYYY-MM'));
            const [expandedDate, setExpandedDate] = useState(null);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const [manualDate, setManualDate] = useState(moment().format('YYYY-MM-DD'));
            const [manualIncome, setManualIncome] = useState('');
            const [manualExpense, setManualExpense] = useState('');
            const [manualNote, setManualNote] = useState('');
            const [manualCart, setManualCart] = useState({});

            const nanyaTrans = useMemo(() => {
                return transactions.filter(t => t.franchise === '湳雅直營店' && t.type === '直營報表')
                    .sort((a,b) => b.id - a.id);
            }, [transactions]);

            const monthStats = useMemo(() => {
                const start = moment(selectedMonth).startOf('month');
                const end = moment(selectedMonth).endOf('month');
                const filtered = nanyaTrans.filter(t => moment(t.date).isBetween(start, end, 'day', '[]'));
                const dailyGroups = {};
                let totalRev = 0;
                
                filtered.forEach(t => {
                    if (!dailyGroups[t.date]) dailyGroups[t.date] = { rev: 0, cost: 0, exp: 0, items: [] };
                    const exp = t.rawExpenses || 0;
                    const cogs = (t.cost - exp);
                    dailyGroups[t.date].rev += t.income;
                    dailyGroups[t.date].exp += exp;
                    dailyGroups[t.date].cost += cogs;
                    dailyGroups[t.date].items.push(t);
                    totalRev += t.income;
                });
                Object.keys(dailyGroups).forEach(d => { dailyGroups[d].net = dailyGroups[d].rev - (dailyGroups[d].exp + dailyGroups[d].cost); });
                return { dailyGroups, list: filtered, totalRev };
            }, [nanyaTrans, selectedMonth]);

            useEffect(() => {
                if (view === 'history' && chartRef.current) {
                    if (chartInstance.current) chartInstance.current.destroy();
                    const ctx = chartRef.current.getContext('2d');
                    
                    const labels = Object.keys(monthStats.dailyGroups).sort(); 
                    const dataRev = labels.map(d => monthStats.dailyGroups[d].rev);
                    const dataExpTotal = labels.map(d => monthStats.dailyGroups[d].exp + monthStats.dailyGroups[d].cost);

                    chartInstance.current = new Chart(ctx, {
                        type: 'bar', 
                        data: {
                            labels: labels.map(d => d.substring(5)), 
                            datasets: [
                                { type: 'bar', label: '當日營收', data: dataRev, backgroundColor: '#22c55e', order: 2, datalabels: { anchor: 'end', align: 'top', font: { size: 10, weight: 'bold' }, formatter: (val) => val > 0 ? val : '' } }, 
                                { type: 'line', label: '總成本(含食材)', data: dataExpTotal, borderColor: '#ef4444', backgroundColor: '#ef4444', borderWidth: 2, fill: false, tension: 0.1, order: 1, datalabels: { align: 'bottom', color: '#b91c1c', font: { size: 9 }, formatter: (val) => val > 0 ? val : '' } }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: `${selectedMonth} 每日營收 vs 成本` }, legend: { position: 'bottom' }, datalabels: { display: true } }, scales: { y: { beginAtZero: true } } }
                    });
                }
            }, [view, monthStats]);

            const handleManualCartChange = (id, val) => {
                const newQty = parseFloat(val);
                if (isNaN(newQty) || newQty < 0) { const { [id]: _, ...rest } = manualCart; setManualCart(rest); } else { setManualCart({ ...manualCart, [id]: newQty }); }
            };

            const submitManualReport = () => {
                if (isReadonly) return;
                if (!manualDate || !manualIncome) return alert('請輸入日期與業績');
                const income = parseInt(manualIncome);
                const expense = parseInt(manualExpense) || 0;
                const itemsList = [];
                Object.entries(manualCart).forEach(([id, qty]) => {
                    const item = items.find(i => i.id === id);
                    if (item && qty > 0) {
                        let finalQty = qty; let unit = item.unit;
                        if (item.isBox) { finalQty = qty / 6; unit = "包(已轉箱)"; }
                        itemsList.push({ ...item, qty: finalQty, displayUnit: unit, inputQty: qty });
                    }
                });
                const duplicate = transactions.find(t => t.franchise === '湳雅直營店' && t.date === manualDate && t.type === '直營報表');
                if (duplicate) { if (!confirm(`警告：${manualDate} 已經有一筆報表紀錄，是否要建立新的一筆？`)) return; }
                processSubmission(manualDate, income, expense, manualNote, itemsList);
                setManualIncome(''); setManualExpense(''); setManualNote(''); setManualCart({});
            };

            const processSubmission = (pDate, pIncome, pExpense, pNote, pItems) => {
                const totalCostOfGoods = pItems.reduce((sum, item) => sum + (item.cost * item.qty), 0);
                const totalCost = totalCostOfGoods + pExpense;
                const profit = pIncome - totalCost;
                let content = `【直營日報】\n日期：${pDate}\n業績：$${pIncome.toLocaleString()}\n`;
                if (pExpense > 0) content += `支出：$${pExpense.toLocaleString()} (${pNote || '雜支'})\n`;
                content += `------------------\n[消耗品項]\n`;
                pItems.forEach(i => {
                    const displayQty = i.inputQty ? i.inputQty : i.qty;
                    const displayUnit = i.displayUnit || i.unit;
                    content += `${i.name}: ${displayQty}${displayUnit} (成本$${(i.cost * i.qty).toFixed(0)})\n`;
                });
                content += `------------------\n淨利：$${profit.toLocaleString()}`;
                const record = { id: Date.now(), date: pDate, time: moment().format('A h:mm'), type: '直營報表', franchise: '湳雅直營店', content: content, rawItems: pItems.map(i => ({...i, id: i.id, qty: i.qty})), shipping: 0, income: pIncome, rawExpenses: pExpense, expenseDetail: pNote, cost: totalCost, profit: profit, total: pIncome };
                onSubmit(record);
                pItems.forEach(item => onUpdateInv(item.id, -item.qty));
                alert('日報表已建立，庫存已扣除');
            };

            const toggleExpand = (date) => setExpandedDate(expandedDate === date ? null : date);

            return (
                <div className="space-y-4">
                    <div className="flex bg-gray-200 p-1 rounded">
                        <button onClick={()=>setView('manual')} className={`flex-1 py-2 rounded text-sm font-bold ${view==='manual'?'bg-white shadow text-purple-600':''}`}>手動輸入</button>
                        <button onClick={()=>setView('history')} className={`flex-1 py-2 rounded text-sm font-bold ${view==='history'?'bg-white shadow text-green-600':''}`}>當月營運圖表</button>
                    </div>
                    {view === 'manual' && (
                        <div className={`bg-white p-4 shadow rounded space-y-4 animate-fade-in ${isReadonly ? 'readonly-mode' : ''}`}>
                            <h3 className="font-bold border-b pb-2">手動補登日報</h3>
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="block text-xs font-bold text-gray-500">日期</label><input type="date" value={manualDate} onChange={e=>setManualDate(e.target.value)} className="w-full border p-2 rounded"/></div>
                                <div><label className="block text-xs font-bold text-gray-500">當日業績</label><input type="number" value={manualIncome} onChange={e=>setManualIncome(e.target.value)} className="w-full border p-2 rounded font-bold text-green-700" placeholder="$"/></div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="block text-xs font-bold text-gray-500">費用總額</label><input type="number" value={manualExpense} onChange={e=>setManualExpense(e.target.value)} className="w-full border p-2 rounded text-red-600" placeholder="$"/></div>
                                <div><label className="block text-xs font-bold text-gray-500">費用細項 (備註)</label><input type="text" value={manualNote} onChange={e=>setManualNote(e.target.value)} className="w-full border p-2 rounded" placeholder="如: 瓦斯, 買菜"/></div>
                            </div>
                            <div className="border-t pt-2">
                                <label className="block text-xs font-bold text-gray-500 mb-2">消耗品項 (冷凍品請輸入"包"數)</label>
                                <div className="grid grid-cols-2 gap-2 h-60 overflow-y-auto border p-2 rounded bg-gray-50">
                                    {items.map(item => (
                                        <div key={item.id} className="flex justify-between items-center bg-white p-2 rounded border shadow-sm">
                                            <span className="text-sm">{item.name}</span>
                                            <div className="flex items-center space-x-1">
                                                <input type="number" value={manualCart[item.id] || ''} onChange={e=>handleManualCartChange(item.id, e.target.value)} className="w-12 border text-center text-sm p-1 rounded" placeholder="0"/>
                                                <span className="text-xs text-gray-400">{item.isBox ? '包' : item.unit}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            {!isReadonly && <button onClick={submitManualReport} className="w-full bg-purple-600 text-white py-3 rounded font-bold hover:bg-purple-700">建立日報表</button>}
                        </div>
                    )}
                    {view === 'history' && (
                        <div className="space-y-4">
                            <div className="bg-white p-4 shadow rounded flex items-center justify-between"><span className="font-bold">月份選擇</span><input type="month" value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)} className="border p-2 rounded"/></div>
                            <div className="bg-white p-2 shadow rounded h-80">
                                <div className="text-center font-bold text-gray-700 mb-2 text-sm bg-gray-50 p-1 rounded">當月總營收: ${monthStats.totalRev.toLocaleString()}</div>
                                <canvas ref={chartRef}></canvas>
                            </div>
                            <div className="bg-white shadow rounded overflow-hidden">
                                <div className="bg-gray-100 p-2 font-bold text-xs text-gray-500">歷史紀錄 (本月倒序)</div>
                                <div className="max-h-80 overflow-y-auto p-2">
                                    {Object.entries(monthStats.dailyGroups).sort((a,b) => b[0].localeCompare(a[0])).map(([date, group]) => (
                                        <div key={date} className="border rounded mb-2 overflow-hidden shadow-sm">
                                             <div className="bg-gray-50 hover:bg-gray-100 p-3 flex justify-between items-center cursor-pointer select-none" onClick={()=>toggleExpand(date)}>
                                                 <div className="flex items-center space-x-2">
                                                     <i className={`fa-solid ${expandedDate === date ? 'fa-chevron-down' : 'fa-chevron-right'} text-gray-400 text-xs w-4`}></i>
                                                     <span className="font-bold text-gray-700">{date}</span>
                                                     <span className="text-xs bg-gray-200 text-gray-600 px-1.5 rounded-full">{group.items.length}筆</span>
                                                 </div>
                                                 <div className="text-right">
                                                     <span className={`font-mono font-bold block ${group.net >= 0 ? 'text-blue-600' : 'text-red-600'}`}>${group.net.toLocaleString()}</span>
                                                     <span className="text-[10px] text-gray-400 block">支:${group.exp.toLocaleString()}</span>
                                                 </div>
                                             </div>
                                             {expandedDate === date && (
                                                <div className="bg-white border-t">
                                                    {group.items.map(t => (
                                                        <div key={t.id} className="flex justify-between items-center p-3 border-b last:border-0 hover:bg-gray-50">
                                                            <div className="flex-1">
                                                                <div className="text-sm text-gray-700 font-medium whitespace-pre-wrap">{t.content.split('\n')[2] || t.content}</div> 
                                                            </div>
                                                            <div className="text-right px-4">
                                                                <div className="text-green-600 font-bold text-sm">+${t.income.toLocaleString()}</div>
                                                                <div className="text-red-400 text-xs">-${(t.cost - (t.rawExpenses||0)).toLocaleString()}(材)</div>
                                                            </div>
                                                            {!isReadonly && <button onClick={() => onDelete(t.id, t.type)} className="text-gray-300 hover:text-red-500 p-2"><i className="fa-solid fa-trash-can"></i></button>}
                                                        </div>
                                                    ))}
                                                </div>
                                             )}
                                        </div>
                                    ))}
                                    {monthStats.list.length === 0 && <div className="p-4 text-center text-gray-400 text-sm">本月尚無資料</div>}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const OrderTab = ({ items, inventory, onSubmit, onUpdateInv, franchises, genReceipt, role }) => {
            const isReadonly = role === ROLES.VIEWER;
            const [cart, setCart] = useState({}); 
            const [franchiseName, setFranchiseName] = useState(''); 
            const [orderDate, setOrderDate] = useState(moment().format('YYYY-MM-DD')); 
            const [isTransfer, setIsTransfer] = useState(false); 
            const [shippingFee, setShippingFee] = useState(0);
            const [isShippingManual, setIsShippingManual] = useState(false);
            const [extraItems, setExtraItems] = useState([]);
            const [tempItemName, setTempItemName] = useState('');
            const [tempItemAmount, setTempItemAmount] = useState('');

            const handleQtyChange = (id, val) => { const newQty = parseInt(val) || 0; setCart(prev => { if (newQty <= 0) { const { [id]: _, ...rest } = prev; return rest; } return { ...prev, [id]: newQty }; }); };
            
            useEffect(() => {
                if (!isShippingManual) {
                    let boxCount = 0;
                    items.forEach(item => { if (item.isBox && cart[item.id]) boxCount += cart[item.id]; });
                    setShippingFee(boxCount * 120);
                }
            }, [cart, items, isShippingManual]);

            const handleShippingChange = (e) => { setShippingFee(e.target.value); setIsShippingManual(true); };
            const resetShipping = () => { setIsShippingManual(false); let boxCount = 0; items.forEach(item => { if (item.isBox && cart[item.id]) boxCount += cart[item.id]; }); setShippingFee(boxCount * 120); };
            const addExtraItem = () => { if(!tempItemName || !tempItemAmount) return; setExtraItems([...extraItems, { id: Date.now(), name: tempItemName, amount: Number(tempItemAmount) }]); setTempItemName(''); setTempItemAmount(''); };
            const removeExtraItem = (id) => { setExtraItems(extraItems.filter(i => i.id !== id)); };

            const prepareOrderData = () => {
                let productTotal = 0; let itemDetails = [];
                Object.entries(cart).forEach(([id, qty]) => { 
                    const item = items.find(i => i.id === id); 
                    if(item) { productTotal += (isTransfer ? 0 : item.price) * qty; itemDetails.push({...item, qty, price: isTransfer ? 0 : item.price}); } 
                });
                return { itemDetails, productTotal };
            };

            const copyToClipboard = () => { 
                const { itemDetails } = prepareOrderData(); 
                const title = isTransfer ? `【調撥單】_${franchiseName || '未填寫'}` : `【訂貨單】_${franchiseName || '未填寫'}`;
                const text = genReceipt(title, moment(orderDate).format('YYYY/MM/DD'), itemDetails, items.reduce((map, i) => ({...map, [i.id]: i}), {}), extraItems, Number(shippingFee));
                const ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');alert('已複製\n'+text);}catch(e){alert('複製失敗');} document.body.removeChild(ta); 
            };

            const handleSubmit = () => { 
                if (isReadonly) return;
                if (!franchiseName) return alert('請輸入對象(加盟點/單位)'); 
                if (Object.keys(cart).length === 0) return alert('購物車是空的'); 
                
                const { itemDetails, productTotal } = prepareOrderData();
                const finalShipping = Number(shippingFee);
                const extrasTotal = extraItems.reduce((a,b) => a + b.amount, 0);
                const totalAmount = isTransfer ? 0 : (productTotal + extrasTotal + finalShipping);
                
                let productCost = 0;
                itemDetails.forEach(item => { 
                    const originalItem = items.find(i => i.id === item.id);
                    productCost += (originalItem ? originalItem.cost : 0) * item.qty; 
                    onUpdateInv(item.id, -item.qty); 
                });
                
                const title = isTransfer ? `【調撥單】_${franchiseName}` : `【訂貨單】_${franchiseName}`;
                const detailsText = genReceipt(title, moment(orderDate).format('YYYY/MM/DD'), itemDetails, items.reduce((map, i) => ({...map, [i.id]: i}), {}), extraItems, finalShipping);
                
                const record = { id: Date.now(), date: moment(orderDate).format('YYYY/MM/DD'), time: moment().format('A h:mm'), type: isTransfer ? '調撥' : '出貨', franchise: franchiseName, content: detailsText.trim(), rawItems: itemDetails, shipping: finalShipping, otherFee: extrasTotal, income: totalAmount, cost: productCost + finalShipping, profit: totalAmount - (productCost + finalShipping), total: totalAmount }; 
                onSubmit(record); 
                alert(isTransfer ? '調撥單已建立' : '出貨單已建立'); 
                setCart({}); setFranchiseName(''); setExtraItems([]); setIsTransfer(false); setShippingFee(0); setIsShippingManual(false);
            };

            return (
                <div className="space-y-4">
                    <datalist id="franchise-list-order">{franchises.filter(f => f !== '湳雅直營店').map(f=><option key={f} value={f}/>)}</datalist>
                    <div className={`bg-white p-4 rounded-lg shadow border ${isReadonly ? 'readonly-mode' : ''}`}>
                        <div className="flex justify-between items-center mb-4 border-b pb-2">
                             <div className="font-bold text-gray-700">出貨 / 調撥資訊</div>
                             <label className={`flex items-center space-x-2 px-3 py-1 rounded cursor-pointer select-none border ${isTransfer ? 'bg-orange-100 border-orange-500 text-orange-700' : 'bg-gray-100 text-gray-500'}`}>
                                 <input type="checkbox" checked={isTransfer} onChange={e=>setIsTransfer(e.target.checked)} className="form-checkbox"/>
                                 <span className="font-bold text-sm">調撥 (不計營收)</span>
                             </label>
                        </div>
                        <div className="grid grid-cols-2 gap-4 mb-4">
                            <div><label className="block text-sm text-gray-700">日期</label><input type="date" value={orderDate} onChange={e=>setOrderDate(e.target.value)} className="w-full border rounded p-2"/></div>
                            <div><label className="block text-sm text-gray-700">對象</label><input type="text" list="franchise-list-order" value={franchiseName} onChange={e=>setFranchiseName(e.target.value)} className="w-full border rounded p-2" placeholder="請輸入或選擇"/></div>
                        </div>
                        <div className="bg-blue-50 p-3 rounded border border-blue-100 mb-2">
                            <div className="flex justify-between items-center mb-1">
                                <label className="text-xs font-bold text-blue-700">運費設定 (預設 $120/箱)</label>
                                {isShippingManual && <button onClick={resetShipping} className="text-xs text-gray-500 underline">重置自動計算</button>}
                            </div>
                            <input type="number" value={shippingFee} onChange={handleShippingChange} className={`w-full border p-2 rounded ${isShippingManual ? 'bg-yellow-50 font-bold border-yellow-300' : 'bg-white'}`} placeholder="輸入運費"/>
                        </div>
                        <div className="bg-gray-50 p-3 rounded border">
                            <div className="flex gap-2 mb-2">
                                <input type="text" placeholder="項目名稱" value={tempItemName} onChange={e=>setTempItemName(e.target.value)} className="border p-2 flex-1 rounded text-sm"/>
                                <input type="number" placeholder="$" value={tempItemAmount} onChange={e=>setTempItemAmount(e.target.value)} className="border p-2 w-20 rounded text-sm"/>
                                <button onClick={addExtraItem} className="bg-blue-500 text-white px-3 rounded font-bold text-sm">+</button>
                            </div>
                            <div className="space-y-1">
                                {extraItems.map(item => (
                                    <div key={item.id} className="flex justify-between text-sm bg-white p-1 px-2 border rounded">
                                        <span>{item.name}</span>
                                        <span className="flex items-center gap-2">${item.amount} <i className="fa-solid fa-times text-red-400 cursor-pointer" onClick={()=>removeExtraItem(item.id)}></i></span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className={`grid grid-cols-2 gap-3 ${isReadonly ? 'readonly-mode' : ''}`}>
                        {items.map(item=>(
                            <div key={item.id} className={`bg-white p-3 shadow-sm border flex justify-between ${isTransfer ? 'border-orange-200':''}`}>
                                <div><div className="font-bold">{item.name}</div><div className="text-xs text-gray-500">${item.price}</div></div>
                                <div className="flex items-center space-x-2">
                                    <button onClick={()=>handleQtyChange(item.id, (cart[item.id]||0)-1)} className="w-8 border">-</button>
                                    <input type="number" value={cart[item.id]||''} onChange={e=>handleQtyChange(item.id, e.target.value)} className="w-10 text-center border"/>
                                    <button onClick={()=>handleQtyChange(item.id, (cart[item.id]||0)+1)} className="w-8 border">+</button>
                                </div>

        const StockInTab = ({ items, inventory, onSubmit, onUpdateInv, expenseNames, transactions, role }) => {

                    let expName = ''; let expAmt = 0;
                    if(t.content && t.content.includes('【其他費用】')) { const match = t.content.match(/【其他費用】\n(.*?): \$([\d,]+)/); if(match) { expName = match[1].trim(); expAmt = parseFloat(match[2].replace(/,/g, '')); } }

                stats.expenses.total = stats.expenses.items.reduce((a,b) => a + b.total, 0);
