<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>加盟進銷存管理系統 Pro v67 (Google 登入恢復版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/locale/zh-tw.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .num-font { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .readonly-mode { pointer-events: none; opacity: 0.7; filter: grayscale(20%); }
        .calendar-cell { min-height: 65px; }
        @media (min-width: 768px) { .calendar-cell { aspect-ratio: 1 / 1.1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyBEQyeP-aKoi4rzrdMUxeDXexPrm5EdVZM",
            authDomain: "ukaportfinance.firebaseapp.com",
            projectId: "ukaportfinance",
            storageBucket: "ukaportfinance.firebasestorage.app",
            messagingSenderId: "1024449773890",
            appId: "1:1024449773890:web:09f9822449aae305ba88db",
            measurementId: "G-224CPH1PRX"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        const ROLES = { ADMIN: 'admin', OPERATOR: 'operator', VIEWER: 'viewer' };
        const checkUserRole = (email) => {
            if (!email) return ROLES.VIEWER;
            const e = email.toLowerCase();
            if (e === 'a0935505590@gmail.com') return ROLES.OPERATOR;
            if (e === 'aa0980115055@gmail.com') return ROLES.VIEWER;
            return ROLES.ADMIN;
        };

        const formatBoxQty = (val) => {
            if (val === undefined || val === null) return '0';
            const num = parseFloat(Number(val));
            if (isNaN(num)) return '0';
            const fixedNum = parseFloat(num.toFixed(4));
            const intPart = Math.floor(fixedNum);
            const decPart = fixedNum - intPart;
            const packs = Math.round(decPart * 6);
            if (packs === 0) return intPart.toString();
            if (packs === 6) return (intPart + 1).toString();
            return intPart > 0 ? `${intPart} ${packs}/6` : `${packs}/6`;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [role, setRole] = useState(null);
            const [db, setDb] = useState(null);
            const [activeTab, setActiveTab] = useState('order'); 
            const [inventory, setInventory] = useState({});
            const [transactions, setTransactions] = useState([]);
            const [appSettings, setAppSettings] = useState(null);
            const [loading, setLoading] = useState(false);

            useEffect(() => { setDb(firebase.firestore()); }, []);

            useEffect(() => {
                const unsub = firebase.auth().onAuthStateChanged((u) => {
                    setUser(u);
                    if (u) {
                        setLoading(true);
                        const userRole = checkUserRole(u.email);
                        setRole(userRole);
                        const sharedRef = firebase.firestore().collection('company_data').doc('main_system');
                        const unsubTrans = sharedRef.collection('transactions').orderBy('id', 'desc').onSnapshot(snap => {
                            const list = []; snap.forEach(doc => list.push(doc.data())); setTransactions(list);
                        });
                        const unsubInv = sharedRef.collection('data').doc('inventory').onSnapshot(doc => {
                            if (doc.exists) setInventory(doc.data());
                        });
                        const unsubSettings = sharedRef.collection('data').doc('settings').onSnapshot(doc => {
                            if (doc.exists) setAppSettings(doc.data());
                            setLoading(false);
                        });
                        return () => { unsubTrans(); unsubInv(); unsubSettings(); };
                    }
                });
                return () => unsub();
            }, []);

            const addTransaction = (record) => {
                if (!user || !db) return;
                record.createdBy = user.email;
                db.collection('company_data').doc('main_system').collection('transactions').doc(String(record.id)).set(record);
            };

            const updateTransaction = (id, newFields) => {
                if (!user || !db) return;
                db.collection('company_data').doc('main_system').collection('transactions').doc(String(id)).update(newFields);
            };

            const deleteTransaction = async (id, type) => {
                if (!user || !db) return;
                if (!confirm('確定要刪除此筆資料嗎？')) return;
                setLoading(true);
                try {
                    const txRef = db.collection('company_data').doc('main_system').collection('transactions').doc(String(id));
                    const doc = await txRef.get();
                    const tx = doc.data();
                    const invRef = db.collection('company_data').doc('main_system').collection('data').doc('inventory');
                    const invUpdates = {};
                    if ((tx.type === '出貨' || tx.type === '調撥' || tx.type === '直營報表') && tx.rawItems) {
                        tx.rawItems.forEach(item => { if (item.id) invUpdates[item.id] = firebase.firestore.FieldValue.increment(item.qty); });
                    }
                    if (Object.keys(invUpdates).length > 0) await invRef.update(invUpdates);
                    await txRef.delete();
                } catch (e) { alert(e.message); } finally { setLoading(false); }
            };

            const updateInventory = (id, change) => {
                const invRef = db.collection('company_data').doc('main_system').collection('data').doc('inventory');
                invRef.update({ [id]: firebase.firestore.FieldValue.increment(change) });
            };

            if (!user) return <LoginScreen />;

            return (
                <div className="min-h-screen max-w-5xl mx-auto bg-white shadow-xl flex flex-col">
                    <div className="bg-slate-800 text-white p-4 sticky top-0 z-50 shadow-md">
                        <div className="flex justify-between items-center mb-2">
                            <h1 className="text-lg font-bold"><i className="fa-solid fa-cloud mr-2 text-green-400"></i>加盟系統 Pro v67</h1>
                            <div className="flex items-center space-x-2">
                                <span className="text-[10px] md:text-xs text-slate-300">{user.email}</span>
                                <button onClick={() => firebase.auth().signOut()} className="text-xs bg-slate-700 px-2 py-1 rounded">登出</button>
                            </div>
                        </div>
                        <div className="flex space-x-1 overflow-x-auto no-scrollbar">
                            {['order', 'stockIn', 'direct', 'franchise', 'report', 'settings'].map(id => (
                                <button key={id} onClick={() => setActiveTab(id)} className={`flex-1 py-2 px-3 rounded-t-lg text-sm transition ${activeTab === id ? 'bg-white text-slate-800 font-bold' : 'text-slate-300'}`}>
                                    {id==='order'?'出貨/帳務':id==='stockIn'?'進貨':id==='direct'?'直營':id==='franchise'?'加盟':id==='report'?'總報表':'設定'}
                                </button>
                            ))}
                        </div>
                    </div>
                    <div className="p-4 mb-20 flex-1 overflow-y-auto">
                        {(loading || !appSettings) && <div className="text-center py-20 text-gray-400"><i className="fa-solid fa-spinner fa-spin mr-2"></i>資料載入中...</div>}
                        {!loading && appSettings && (
                            <div className="animate-fade-in">
                                {activeTab === 'order' && <OrderTab items={appSettings.items} inventory={inventory} onSubmit={addTransaction} onUpdateInv={updateInventory} onUpdateTrans={updateTransaction} transactions={transactions} role={role} />}
                                {activeTab === 'stockIn' && <StockInTab items={appSettings.items} inventory={inventory} onSubmit={addTransaction} onUpdateInv={updateInventory} transactions={transactions} role={role} />}
                                {activeTab === 'direct' && <DirectStoreTab items={appSettings.items} inventory={inventory} onSubmit={addTransaction} onUpdateInv={updateInventory} transactions={transactions} onDelete={deleteTransaction} role={role} />}
                                {activeTab === 'franchise' && <FranchiseTab items={appSettings.items} inventory={inventory} onSubmit={addTransaction} onUpdateInv={updateInventory} onUpdateTrans={updateTransaction} onDelete={deleteTransaction} transactions={transactions} settings={appSettings} role={role} />}
                                {activeTab === 'report' && <ReportTab transactions={transactions} onDelete={deleteTransaction} items={appSettings.items} role={role} />}
                                {activeTab === 'settings' && <SettingsTab settings={appSettings} onSave={(s)=>db.collection('company_data').doc('main_system').collection('data').doc('settings').set(s)} role={role} />}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const LoginScreen = () => {
            const [email, setEmail] = useState(''); const [pwd, setPwd] = useState('');
            const [loading, setLoading] = useState(false);

            const handleAuth = (e) => { 
                e.preventDefault(); 
                setLoading(true);
                firebase.auth().signInWithEmailAndPassword(email, pwd)
                    .catch(err => {
                        alert('登入失敗，請檢查帳號密碼');
                        setLoading(false);
                    }); 
            };

            const handleGoogleLogin = () => {
                setLoading(true);
                const provider = new firebase.auth.GoogleAuthProvider();
                firebase.auth().signInWithPopup(provider)
                    .catch(err => {
                        alert('Google 登入失敗: ' + err.message);
                        setLoading(false);
                    });
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
                    <div className="bg-white p-6 rounded-lg shadow-lg w-full max-w-sm">
                        <h2 className="text-2xl font-bold mb-6 text-center text-slate-800">登入系統</h2>
                        
                        {/* Google Login Button */}
                        <button 
                            onClick={handleGoogleLogin} 
                            disabled={loading}
                            className="w-full mb-6 bg-white border border-gray-300 text-gray-700 py-2.5 rounded-lg font-bold flex items-center justify-center hover:bg-gray-50 transition shadow-sm"
                        >
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" className="w-5 h-5 mr-3"/>
                            使用 Google 帳號登入
                        </button>

                        <div className="flex items-center my-4 text-gray-400">
                            <div className="flex-1 border-t border-gray-200"></div>
                            <span className="mx-3 text-xs">或使用 Email 登入</span>
                            <div className="flex-1 border-t border-gray-200"></div>
                        </div>

                        <form onSubmit={handleAuth} className="space-y-4">
                            <div>
                                <label className="block text-xs font-bold text-gray-500 mb-1">Email</label>
                                <input type="email" placeholder="example@gmail.com" className="w-full border p-3 rounded-lg" value={email} onChange={e=>setEmail(e.target.value)} required/>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-gray-500 mb-1">密碼</label>
                                <input type="password" placeholder="請輸入密碼" className="w-full border p-3 rounded-lg" value={pwd} onChange={e=>setPwd(e.target.value)} required/>
                            </div>
                            <button 
                                type="submit" 
                                disabled={loading}
                                className="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition"
                            >
                                {loading ? '處理中...' : '登入'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const OrderTab = ({ items, inventory, onSubmit, onUpdateInv, onUpdateTrans, transactions, role }) => {
            const [view, setView] = useState('order'); 
            const [cart, setCart] = useState({});
            const [fName, setFName] = useState('');
            const [orderDate, setOrderDate] = useState(moment().format('YYYY-MM-DD'));
            const [extraItems, setExtraItems] = useState([]);
            const [tempExtraName, setTempExtraName] = useState('');
            const [tempExtraAmount, setTempExtraAmount] = useState('');
            const [paymentInputs, setPaymentInputs] = useState({});
            const [paymentDates, setPaymentDates] = useState({});

            const receivableTrans = useMemo(() => {
                return transactions.filter(t => t.type === '出貨' || t.type === '應收帳款').sort((a, b) => {
                    const balanceA = (a.total || 0) - (a.paidAmount || 0);
                    const balanceB = (b.total || 0) - (b.paidAmount || 0);
                    if (Math.abs(balanceA) > 0 && Math.abs(balanceB) <= 0) return -1;
                    if (Math.abs(balanceA) <= 0 && Math.abs(balanceB) > 0) return 1;
                    return b.id - a.id;
                });
            }, [transactions]);

            const copyOrderToClipboard = () => {
                if (!fName) return alert('請輸入店名/對象');
                let productTotal = 0;
                let boxText = "", otherText = "";
                
                Object.entries(cart).forEach(([id, q]) => {
                    if (q <= 0) return;
                    const item = items.find(i=>i.id===id);
                    if (item) {
                        const amt = item.price * q;
                        productTotal += amt;
                        const line = `${item.name} x ${q}${item.unit} = $${amt.toLocaleString()}\n`;
                        if (item.category === '箱裝') boxText += line;
                        else otherText += line;
                    }
                });

                let extraTotal = 0;
                let extraText = "";
                extraItems.forEach(ex => {
                    extraTotal += ex.amount;
                    extraText += `${ex.name} : $${ex.amount.toLocaleString()}\n`;
                });

                let text = `【訂貨單】_${fName}\n日期：${moment(orderDate).format('YYYY/MM/DD')}\n------------------\n`;
                if (boxText) text += `[箱裝]\n${boxText}\n`;
                if (otherText) text += `[其他品項]\n${otherText}\n`;
                if (extraText) text += `[其他自訂]\n${extraText}\n`;
                text += `------------------\n總金額：$${(productTotal + extraTotal).toLocaleString()}`;

                const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select();
                document.execCommand('copy'); document.body.removeChild(el);
                alert('訂單內容已複製到剪貼簿！');
            };

            const handleSubmit = () => {
                if (!fName) return alert('請輸入對象');
                let productTotal = 0, productCost = 0, itemDetails = [];
                Object.entries(cart).forEach(([id, q]) => {
                    if (q <= 0) return;
                    const item = items.find(i=>i.id===id);
                    if (item) {
                        productTotal += item.price * q;
                        productCost += item.cost * q;
                        itemDetails.push({...item, qty: q});
                        onUpdateInv(item.id, -q);
                    }
                });
                const extrasTotal = extraItems.reduce((a,b)=>a+b.amount, 0);
                const record = {
                    id: Date.now(), date: moment(orderDate).format('YYYY/MM/DD'), time: moment().format('HH:mm'),
                    type: '出貨', franchise: fName, rawItems: itemDetails, extraItems,
                    income: productTotal + extrasTotal, paidAmount: 0, 
                    cost: productCost, profit: (productTotal + extrasTotal) - productCost,
                    total: productTotal + extrasTotal, content: `訂單: ${fName}`
                };
                onSubmit(record);
                alert('訂單已建立！');
                setCart({}); setFName(''); setExtraItems([]);
            };

            const handlePaymentUpdate = (t, isClearAll = false) => {
                const amountToAdd = isClearAll ? (t.total - (t.paidAmount || 0)) : (parseFloat(paymentInputs[t.id]) || 0);
                const payDate = paymentDates[t.id] || moment().format('YYYY-MM-DD');
                if (amountToAdd === 0) return;
                const newPaid = (t.paidAmount || 0) + amountToAdd;
                onUpdateTrans(t.id, { paidAmount: newPaid, lastPaidDate: payDate });
                setPaymentInputs({...paymentInputs, [t.id]: ''});
                alert(`已於 ${payDate} 回收 $${amountToAdd.toLocaleString()}`);
            };

            return (
                <div className="space-y-4">
                    <div className="flex bg-gray-200 p-1 rounded">
                        <button onClick={()=>setView('order')} className={`flex-1 py-2 rounded text-sm font-bold ${view==='order'?'bg-white shadow text-blue-600':''}`}>下單出貨</button>
                        <button onClick={()=>setView('receivable')} className={`flex-1 py-2 rounded text-sm font-bold ${view==='receivable'?'bg-white shadow text-orange-600':''}`}>應收貨款追蹤</button>
                    </div>

                    {view === 'order' && (
                        <div className="animate-fade-in space-y-4">
                            <div className="bg-white p-4 rounded shadow border space-y-3">
                                <div className="grid grid-cols-2 gap-3">
                                    <input type="text" value={fName} onChange={e=>setFName(e.target.value)} placeholder="帳款人 (如: 竹南_阿嫣)" className="border p-2 rounded text-sm"/>
                                    <input type="date" value={orderDate} onChange={e=>setOrderDate(e.target.value)} className="border p-2 rounded text-sm"/>
                                </div>
                                <div className="bg-purple-50 p-2 rounded border border-purple-100">
                                    <div className="flex gap-2">
                                        <input type="text" value={tempExtraName} onChange={e=>setTempExtraName(e.target.value)} placeholder="折扣或其他品項" className="flex-1 border p-1 rounded text-xs"/>
                                        <input type="number" value={tempExtraAmount} onChange={e=>setTempExtraAmount(e.target.value)} placeholder="金額" className="w-20 border p-1 rounded text-xs"/>
                                        <button onClick={()=>{if(!tempExtraName||!tempExtraAmount)return; setExtraItems([...extraItems, {id:Date.now(), name:tempExtraName, amount:Number(tempExtraAmount)}]); setTempExtraName(''); setTempExtraAmount('');}} className="bg-purple-600 text-white px-3 rounded">+</button>
                                    </div>
                                    <div className="mt-2 space-y-1">
                                        {extraItems.map(ex=><div key={ex.id} className="flex justify-between text-xs bg-white p-1 rounded shadow-sm"><span>{ex.name}</span><span className="font-bold text-purple-700">${ex.amount.toLocaleString()}</span></div>)}
                                    </div>
                                </div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                {items.map(item=>(
                                    <div key={item.id} className="bg-white p-3 border rounded flex justify-between items-center shadow-sm">
                                        <div className="text-sm font-bold">{item.name}<div className="text-[10px] text-gray-400">存: {item.isBox?formatBoxQty(inventory[item.id]):(inventory[item.id]||0)}</div></div>
                                        <div className="flex items-center space-x-2">
                                            <button onClick={()=>setCart({...cart, [item.id]:Math.max(0, (cart[item.id]||0)-1)})} className="w-8 h-8 border rounded">-</button>
                                            <input type="number" value={cart[item.id]||''} onChange={e=>setCart({...cart, [item.id]:parseInt(e.target.value)||0})} className="w-10 text-center text-sm border-b"/>
                                            <button onClick={()=>setCart({...cart, [item.id]:(cart[item.id]||0)+1})} className="w-8 h-8 border rounded">+</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="sticky bottom-4 bg-slate-800 p-3 rounded-lg shadow-xl flex gap-3 z-10">
                                <button onClick={copyOrderToClipboard} className="flex-1 bg-green-600 text-white py-3 rounded font-bold flex items-center justify-center gap-1"><i className="fa-regular fa-copy"></i> 複製訂單</button>
                                <button onClick={handleSubmit} className="flex-1 bg-blue-600 text-white py-3 rounded font-bold flex items-center justify-center gap-1"><i className="fa-solid fa-check"></i> 建立訂單</button>
                            </div>
                        </div>
                    )}

                    {view === 'receivable' && (
                        <div className="space-y-3 animate-fade-in">
                            {receivableTrans.map(t => {
                                const balance = t.total - (t.paidAmount || 0);
                                const isFullyPaid = Math.abs(balance) < 0.1;
                                return (
                                    <div key={t.id} className={`bg-white p-4 border rounded shadow-sm ${isFullyPaid?'opacity-50':'border-l-4 border-l-orange-500'}`}>
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <div className="font-bold">{t.franchise} <span className="text-[10px] text-gray-400">#{t.id}</span></div>
                                                <div className="text-xs text-gray-500">{t.date} | 總額 ${t.total.toLocaleString()}</div>
                                            </div>
                                            <div className="text-right">
                                                <div className={`text-sm font-bold ${isFullyPaid?'text-green-600':'text-red-600'}`}>
                                                    {isFullyPaid ? '已結清' : `欠款 $${balance.toLocaleString()}`}
                                                </div>
                                                <div className="text-[10px] text-gray-400">最後回收: {t.lastPaidDate || '-'}</div>
                                            </div>
                                        </div>
                                        {!isFullyPaid && (
                                            <div className="mt-3 pt-3 border-t grid grid-cols-1 gap-2">
                                                <div className="flex gap-2">
                                                    <input type="date" value={paymentDates[t.id] || moment().format('YYYY-MM-DD')} onChange={e=>setPaymentDates({...paymentDates, [t.id]: e.target.value})} className="border p-1 rounded text-xs w-32"/>
                                                    <input type="number" value={paymentInputs[t.id]||''} onChange={e=>setPaymentInputs({...paymentInputs, [t.id]: e.target.value})} placeholder="回收金額" className="flex-1 border p-1 rounded text-xs"/>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={()=>handlePaymentUpdate(t)} className="flex-1 bg-orange-500 text-white py-1 rounded text-xs font-bold shadow">按次回收</button>
                                                    <button onClick={()=>handlePaymentUpdate(t, true)} className="w-20 bg-slate-700 text-white py-1 rounded text-xs font-bold">全清</button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                            {receivableTrans.length === 0 && <div className="text-center py-20 text-gray-400">尚無帳款紀錄</div>}
                        </div>
                    )}
                </div>
            );
        };

        const DirectStoreTab = ({ items, inventory, onSubmit, onUpdateInv, transactions, onDelete }) => {
            const [selectedMonth, setSelectedMonth] = useState(moment().format('YYYY-MM'));
            const monthStats = useMemo(() => {
                const start = moment(selectedMonth).startOf('month');
                const end = moment(selectedMonth).endOf('month');
                const filtered = transactions.filter(t => t.franchise === '湳雅直營店' && moment(t.date).isBetween(start, end, 'day', '[]'));
                const dailyGroups = {};
                let totalRev = 0, activeDays = 0;
                filtered.forEach(t => {
                    if (!dailyGroups[t.date]) { dailyGroups[t.date] = { rev: 0, net: 0 }; activeDays++; }
                    dailyGroups[t.date].rev += t.income;
                    dailyGroups[t.date].net += t.profit;
                    totalRev += t.income;
                });
                return { dailyGroups, totalRev, avgRev: activeDays > 0 ? Math.round(totalRev / activeDays) : 0 };
            }, [transactions, selectedMonth]);

            return (
                <div className="space-y-4 animate-fade-in">
                    <div className="bg-white p-4 rounded shadow flex justify-between items-center">
                        <input type="month" value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)} className="border p-2 rounded"/>
                        <div className="text-right">
                            <div className="text-xs text-gray-500 font-bold">月總收: ${monthStats.totalRev.toLocaleString()}</div>
                            <div className="text-xs text-blue-600 font-bold">平均: ${monthStats.avgRev.toLocaleString()}</div>
                        </div>
                    </div>
                    <div className="grid grid-cols-7 border bg-white">
                        {['日','一','二','三','四','五','六'].map(d=><div key={d} className="p-1 text-center text-[10px] bg-slate-50 border-b font-bold">{d}</div>)}
                        {Array.from({length: moment(selectedMonth).startOf('month').day()}).map((_,i)=><div key={i} className="border-b border-r bg-gray-50 calendar-cell"></div>)}
                        {Array.from({length: moment(selectedMonth).daysInMonth()}).map((_,i)=>{
                            const d = moment(selectedMonth).date(i+1).format('YYYY-MM-DD');
                            const data = monthStats.dailyGroups[d];
                            const isToday = d === moment().format('YYYY-MM-DD');
                            return (
                                <div key={i} className={`border-b border-r p-0.5 calendar-cell flex flex-col items-center justify-start overflow-hidden ${isToday?'bg-yellow-50 ring-1 ring-yellow-400 z-1':''}`}>
                                    <span className={`text-[10px] self-start px-1 ${isToday?'bg-yellow-400 text-white rounded-full font-bold':'text-gray-400'}`}>{i+1}</span>
                                    {data && <div className="text-[10px] md:text-sm font-bold text-green-600 mt-1">${data.rev.toLocaleString()}</div>}
                                    {data && <div className={`text-[8px] ${data.net>=0?'text-blue-500':'text-red-400'}`}>{data.net>=0?'盈':'虧'}{Math.abs(data.net)}</div>}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const ReportTab = ({ transactions }) => {
            const [start, setStart] = useState(moment().startOf('month').format('YYYY-MM-DD'));
            const [end, setEnd] = useState(moment().endOf('month').format('YYYY-MM-DD'));

            const reportData = useMemo(() => {
                const s = moment(start); const e = moment(end);
                const filtered = transactions.filter(t => moment(t.date).isBetween(s, e, 'day', '[]'));
                const stats = {
                    shipment: { rev: 0, cost: 0, profit: 0 },
                    direct: { rev: 0, cost: 0, profit: 0 },
                    franchise: { rev: 0, cost: 0, profit: 0 },
                    total: { rev: 0, cost: 0, profit: 0 }
                };
                filtered.forEach(t => {
                    let cat = 'total';
                    if (t.type === '出貨') cat = 'shipment';
                    else if (t.type === '直營報表' || t.franchise === '湳雅直營店') cat = 'direct';
                    else if (t.type === '加盟') cat = 'franchise';
                    
                    if (stats[cat]) {
                        stats[cat].rev += (t.income || 0);
                        stats[cat].cost += (t.cost || 0);
                        stats[cat].profit += (t.profit || 0);
                        stats.total.rev += (t.income || 0);
                        stats.total.cost += (t.cost || 0);
                        stats.total.profit += (t.profit || 0);
                    }
                });
                return stats;
            }, [transactions, start, end]);

            const exportCSV = () => {
                let csv = "\uFEFF類別,營收,成本,淨利\n";
                csv += `出貨,${reportData.shipment.rev},${reportData.shipment.cost},${reportData.shipment.profit}\n`;
                csv += `直營,${reportData.direct.rev},${reportData.direct.cost},${reportData.direct.profit}\n`;
                csv += `加盟,${reportData.franchise.rev},${reportData.franchise.cost},${reportData.franchise.profit}\n`;
                csv += `總計,${reportData.total.rev},${reportData.total.cost},${reportData.total.profit}\n`;
                
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.setAttribute("download", `營運報表_${start}_${end}.csv`);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            return (
                <div className="space-y-4 animate-fade-in">
                    <div className="bg-white p-4 rounded shadow border space-y-3">
                        <div className="flex gap-2 items-center text-sm font-bold">日期區間: <input type="date" value={start} onChange={e=>setStart(e.target.value)} className="border rounded p-1"/> 至 <input type="date" value={end} onChange={e=>setEnd(e.target.value)} className="border rounded p-1"/></div>
                        <button onClick={exportCSV} className="w-full bg-green-700 text-white py-2 rounded font-bold flex items-center justify-center gap-2 hover:bg-green-800 transition"><i className="fa-solid fa-file-excel"></i> 下載試算表 (CSV)</button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div className="bg-blue-50 p-4 rounded border border-blue-200 shadow-sm">
                            <h4 className="font-bold text-blue-700 mb-2 border-b border-blue-100">出貨帳務</h4>
                            <div className="flex justify-between text-xs py-1"><span>營收</span><span className="font-mono">${reportData.shipment.rev.toLocaleString()}</span></div>
                            <div className="flex justify-between text-xs py-1"><span>成本</span><span className="font-mono">-${reportData.shipment.cost.toLocaleString()}</span></div>
                            <div className="flex justify-between text-sm py-1 font-bold mt-1 border-t"><span>淨利</span><span className="text-blue-600">${reportData.shipment.profit.toLocaleString()}</span></div>
                        </div>
                        <div className="bg-cyan-50 p-4 rounded border border-cyan-200 shadow-sm">
                            <h4 className="font-bold text-cyan-700 mb-2 border-b border-cyan-100">直營營運</h4>
                            <div className="flex justify-between text-xs py-1"><span>營收</span><span className="font-mono">${reportData.direct.rev.toLocaleString()}</span></div>
                            <div className="flex justify-between text-xs py-1"><span>支出</span><span className="font-mono">-${reportData.direct.cost.toLocaleString()}</span></div>
                            <div className="flex justify-between text-sm py-1 font-bold mt-1 border-t"><span>淨利</span><span className={reportData.direct.profit>=0?'text-green-600':'text-red-600'}>${reportData.direct.profit.toLocaleString()}</span></div>
                        </div>
                        <div className="bg-indigo-50 p-4 rounded border border-indigo-200 shadow-sm">
                            <h4 className="font-bold text-indigo-700 mb-2 border-b border-indigo-100">加盟收支</h4>
                            <div className="flex justify-between text-xs py-1"><span>入帳</span><span className="font-mono">${reportData.franchise.rev.toLocaleString()}</span></div>
                            <div className="flex justify-between text-xs py-1"><span>開辦</span><span className="font-mono">-${reportData.franchise.cost.toLocaleString()}</span></div>
                            <div className="flex justify-between text-sm py-1 font-bold mt-1 border-t"><span>損益</span><span className="text-indigo-600">${reportData.franchise.profit.toLocaleString()}</span></div>
                        </div>
                    </div>

                    <div className="bg-slate-800 text-white p-5 rounded-lg shadow-lg">
                        <div className="flex justify-between items-center">
                            <span className="text-lg font-bold">公司總結算</span>
                            <div className="text-right">
                                <div className="text-3xl font-bold text-green-400">${reportData.total.profit.toLocaleString()}</div>
                                <div className="text-[10px] text-slate-400">營收 ${(reportData.total.rev/10000).toFixed(2)}w / 支出 ${(reportData.total.cost/10000).toFixed(2)}w</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const StockInTab = ({ items, inventory, onSubmit, onUpdateInv }) => {
            const [date, setDate] = useState(moment().format('YYYY-MM-DD'));
            const [quantities, setQuantities] = useState({});
            const [otherName, setOtherName] = useState('');
            const [otherAmt, setOtherAmt] = useState('');

            const handleStockIn = () => {
                let totalCost = 0;
                Object.entries(quantities).forEach(([id, q]) => {
                    if (q > 0) {
                        const item = items.find(i=>i.id===id);
                        totalCost += item.cost * q;
                        onUpdateInv(item.id, q);
                    }
                });
                const other = Number(otherAmt) || 0;
                const rec = { id: Date.now(), date: moment(date).format('YYYY/MM/DD'), type: '進貨/支出', franchise: '-', cost: totalCost + other, income: 0, profit: -other, content: `進貨: ${otherName || '一般'}` };
                onSubmit(rec); alert('進貨登錄成功');
                setQuantities({}); setOtherAmt(''); setOtherName('');
            };

            return (
                <div className="bg-white p-4 rounded shadow space-y-4 animate-fade-in">
                    <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="w-full border p-2 rounded"/>
                    <div className="space-y-2">
                        {items.map(item => (
                            <div key={item.id} className="flex justify-between items-center border-b pb-1">
                                <span className="text-sm font-bold">{item.name} <span className="text-[10px] font-normal text-gray-400">(存:{item.isBox?formatBoxQty(inventory[item.id]):inventory[item.id]})</span></span>
                                <input type="number" value={quantities[item.id]||''} onChange={e=>setQuantities({...quantities, [item.id]: Number(e.target.value)})} placeholder="0" className="w-20 border text-center rounded text-sm"/>
                            </div>
                        ))}
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                        <input type="text" placeholder="雜支名稱" value={otherName} onChange={e=>setOtherName(e.target.value)} className="border p-2 rounded text-sm"/>
                        <input type="number" placeholder="金額" value={otherAmt} onChange={e=>setOtherAmt(e.target.value)} className="border p-2 rounded text-sm"/>
                    </div>
                    <button onClick={handleStockIn} className="w-full bg-blue-600 text-white py-3 rounded-lg font-bold shadow hover:bg-blue-700 transition">確認登錄進貨</button>
                </div>
            );
        };

        const FranchiseTab = ({ items, inventory, onSubmit, onUpdateInv, onUpdateTrans, transactions, settings }) => {
            return (
                <div className="p-10 bg-white rounded-lg shadow text-center text-gray-500 animate-fade-in">
                    <i className="fa-solid fa-handshake text-5xl mb-4 text-indigo-100"></i>
                    <p>加盟功能模組載入中...</p>
                    <p className="text-xs mt-2">請參考出貨頁面之應收帳款追蹤進行帳務管理。</p>
                </div>
            );
        };

        const SettingsTab = ({ settings, onSave, role }) => {
            const [local, setLocal] = useState(settings);
            return (
                <div className="space-y-4 animate-fade-in">
                    <h3 className="font-bold border-b pb-2 flex justify-between">基本參數設定 <span className="text-xs font-normal text-gray-400">僅限管理員修改</span></h3>
                    <div className="space-y-2 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar">
                        {local.items.map((it, idx) => (
                            <div key={it.id} className="bg-white p-3 border rounded-lg flex items-center gap-3 shadow-sm">
                                <div className="flex-1">
                                    <div className="text-xs font-bold text-gray-400">{it.category}</div>
                                    <div className="text-sm font-bold">{it.name}</div>
                                </div>
                                <div className="text-right">
                                    <label className="block text-[10px] text-gray-400">售價</label>
                                    <input className="w-20 border-b text-sm font-mono text-blue-600 text-right focus:outline-none focus:border-blue-500" value={it.price} onChange={e=>{
                                        const next = [...local.items]; next[idx].price = Number(e.target.value);
                                        setLocal({...local, items: next});
                                    }}/>
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="sticky bottom-0 pt-4 bg-white">
                        <button onClick={()=>onSave(local)} className="w-full bg-slate-800 text-white py-3 rounded-lg font-bold shadow-lg hover:bg-slate-900 transition">儲存所有設定</button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
